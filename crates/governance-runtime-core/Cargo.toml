[package]
name = "adze-governance-runtime-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core runtime governance primitives for BDD/profile composition."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["governance", "parser", "metadata", "bdd", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-governance-runtime-core"

[features]
default = []
pure-rust = ["adze-governance-runtime-reporting/pure-rust", "adze-runtime-profile-core/pure-rust"]
tree-sitter-c2rust = ["adze-governance-runtime-reporting/tree-sitter-c2rust", "adze-runtime-profile-core/tree-sitter-c2rust"]
tree-sitter-standard = ["adze-governance-runtime-reporting/tree-sitter-standard", "adze-runtime-profile-core/tree-sitter-standard"]
glr = ["pure-rust", "adze-governance-runtime-reporting/glr", "adze-runtime-profile-core/glr"]
strict_api = ["adze-governance-runtime-reporting/strict_api", "adze-runtime-profile-core/strict_api"]
strict_docs = ["adze-governance-runtime-reporting/strict_docs", "adze-runtime-profile-core/strict_docs"]

[dependencies]
adze-governance-runtime-reporting = { version = "0.1.0", path = "../governance-runtime-reporting" }
adze-runtime-profile-core = { version = "0.1.0", path = "../runtime-profile-core" }

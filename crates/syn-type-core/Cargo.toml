[package]
name = "adze-syn-type-core"
description = "Syn type-shape helpers for Adze macro/tool code generation"
readme = "../../README.md"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[features]
strict_docs = []

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"

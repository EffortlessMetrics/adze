[package]
name = "ts-c-harness"
version = "0.1.0"
edition = "2021"
rust-version.workspace = true

[features]
default = []
runtime-parity = []
ts-ffi-raw = []

[dependencies]

[dev-dependencies]
tree-sitter = "0.25.8"

[package]
name = "adze-ts-c-harness"
version = "0.1.0"
edition = "2024"
rust-version = "1.92.0"
license = "Apache-2.0 OR MIT"
description = "Internal Tree-sitter C FFI parity test harness."
repository = "https://github.com/EffortlessMetrics/adze"
publish = false
keywords = ["tree-sitter", "ffi", "testing", "parity", "parser"]
categories = ["development-tools::testing"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://github.com/EffortlessMetrics/adze"

[features]
default = []
runtime-parity = []
ts-ffi-raw = []

[dependencies]

[dev-dependencies]
tree-sitter = "0.25.8"
tree-sitter-json = "0.24"
cc = "1.1"
serde_json = "1.0"
ts-bridge = { path = "../../tools/ts-bridge" }

[build-dependencies]
cc = "1.1"

[[test]]
name = "raw_cell_parity"
required-features = ["runtime-parity", "ts-ffi-raw"]

[[test]]
name = "ffi_parity"
required-features = ["runtime-parity"]

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
unused_must_use = "deny"
missing_docs = "warn"
unused_extern_crates = "deny"

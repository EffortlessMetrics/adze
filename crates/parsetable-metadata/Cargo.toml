[package]
name = "adze-parsetable-metadata"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared .parsetable metadata model and parsing helpers."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
strict_api = []
strict_docs = []

[dependencies]
adze-governance-metadata = { version = "0.1.0", path = "../governance-metadata" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[package]
name = "adze-parser-contract"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared contracts for parser backend selection and BDD scenario tracking."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[dependencies]
adze-governance-contract = { version = "0.1.0", path = "../governance-contract" }

[features]
default = []
pure-rust = ["adze-governance-contract/pure-rust"]
tree-sitter-c2rust = ["adze-governance-contract/tree-sitter-c2rust"]
tree-sitter-standard = ["adze-governance-contract/tree-sitter-standard"]
glr = ["pure-rust", "adze-governance-contract/glr"]
strict_api = ["adze-governance-contract/strict_api"]
strict_docs = ["adze-governance-contract/strict_docs"]

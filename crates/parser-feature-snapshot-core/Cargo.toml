[package]
name = "adze-parser-feature-snapshot-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Parser feature-profile snapshots for metadata and diagnostics."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-feature-policy-core = { version = "0.1.0", path = "../feature-policy-core" }
serde = { version = "1.0", features = ["derive"] }

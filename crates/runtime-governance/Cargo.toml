[package]
name = "adze-runtime-governance"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Runtime-facing governance helpers for parser feature profiles and BDD progress reporting."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["governance", "parser", "metadata", "bdd", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-runtime-governance"

[features]
default = []
pure-rust = ["adze-runtime-governance-matrix/pure-rust"]
tree-sitter-standard = ["adze-runtime-governance-matrix/tree-sitter-standard"]
tree-sitter-c2rust = ["adze-runtime-governance-matrix/tree-sitter-c2rust"]
glr = ["adze-runtime-governance-matrix/glr"]
strict_api = ["adze-runtime-governance-matrix/strict_api"]
strict_docs = ["adze-runtime-governance-matrix/strict_docs"]

[dependencies]
adze-runtime-governance-matrix = { version = "0.1.0", path = "../runtime-governance-matrix" }

[dev-dependencies]
adze-bdd-grid-core = { version = "0.1.0", path = "../bdd-grid-core" }
adze-feature-policy-core = { version = "0.1.0", path = "../feature-policy-core" }
adze-governance-metadata = { version = "0.1.0", path = "../governance-metadata" }
adze-runtime-governance-api = { version = "0.1.0", path = "../runtime-governance-api" }
adze-runtime-governance-matrix = { version = "0.1.0", path = "../runtime-governance-matrix" }
proptest = { workspace = true }
adze-parsetable-metadata = { version = "0.1.0", path = "../parsetable-metadata" }
serde_json.workspace = true

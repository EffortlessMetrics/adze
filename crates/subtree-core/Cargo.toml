[package]
name = "adze-subtree-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core parse subtree data model and ambiguity helpers for Adze runtimes."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["parser", "glr", "subtree", "ast", "ambiguity"]
categories = ["parsing", "data-structures"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-subtree-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-ir = { version = "0.8.0-dev", path = "../../ir" }
smallvec.workspace = true

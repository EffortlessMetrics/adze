[package]
name = "adze-common-type-ops-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Single-responsibility type transformation helpers for macro/tool syntax handling."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["parser", "grammar", "ast", "types", "macros"]
categories = ["parsing", "development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-common-type-ops-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
syn.workspace = true

[dev-dependencies]
proptest.workspace = true
quote.workspace = true
syn.workspace = true

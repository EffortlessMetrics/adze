[package]
name = "adze-concurrency-env-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Environment-backed parsing and defaults for runtime concurrency caps."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
strict_api = ["adze-concurrency-policy-core/strict_api"]
strict_docs = ["adze-concurrency-policy-core/strict_docs"]

[dependencies]
adze-concurrency-policy-core = { version = "0.1.0", path = "../concurrency-policy-core" }

[dev-dependencies]
proptest = "1.4"
adze-concurrency-parse-core = { version = "0.1.0", path = "../concurrency-parse-core" }

[package]
name = "adze-governance-runtime-reporting"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared reporting helpers for BDD progress and parser feature-profile diagnostics."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
pure-rust = ["adze-bdd-governance-reporting-core/pure-rust"]
tree-sitter-c2rust = ["adze-bdd-governance-reporting-core/tree-sitter-c2rust"]
tree-sitter-standard = ["adze-bdd-governance-reporting-core/tree-sitter-standard"]
glr = ["pure-rust", "adze-bdd-governance-reporting-core/glr"]
strict_api = ["adze-bdd-governance-reporting-core/strict_api"]
strict_docs = ["adze-bdd-governance-reporting-core/strict_docs"]

[dependencies]
adze-bdd-governance-reporting-core = { version = "0.1.0", path = "../bdd-governance-reporting-core" }

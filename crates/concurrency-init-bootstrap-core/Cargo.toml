[package]
name = "adze-concurrency-init-bootstrap-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Bootstraps concurrency caps initialization from environment-derived values."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["concurrency", "threading", "caps", "parallel", "rayon"]
categories = ["concurrency"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-concurrency-init-bootstrap-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-concurrency-env-core = { version = "0.1.0", path = "../concurrency-env-core" }
adze-concurrency-init-bootstrap-policy-core = { version = "0.1.0", path = "../concurrency-init-bootstrap-policy-core" }
adze-concurrency-init-rayon-core = { version = "0.1.0", path = "../concurrency-init-rayon-core" }

[dev-dependencies]
proptest.workspace = true

[package]
name = "adze-governance-metadata"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Governance metadata primitives for BDD progress and parser feature snapshots."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["governance", "parser", "metadata", "bdd", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-governance-metadata"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-bdd-grid-core = { version = "0.1.0", path = "../bdd-grid-core" }
adze-feature-policy-core = { version = "0.1.0", path = "../feature-policy-core" }
serde.workspace = true

[dev-dependencies]
insta = { workspace = true, features = ["json", "yaml"] }
proptest.workspace = true
serde_json.workspace = true
criterion.workspace = true

[[bench]]
name = "bench_governance"
harness = false

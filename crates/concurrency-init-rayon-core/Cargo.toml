[package]
name = "adze-concurrency-init-rayon-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Idempotent Rayon global thread-pool initialization primitives."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["concurrency", "threading", "caps", "parallel", "rayon"]
categories = ["concurrency"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-concurrency-init-rayon-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-concurrency-init-classifier-core = { version = "0.1.0", path = "../concurrency-init-classifier-core" }
rayon = "1.10"

[dev-dependencies]
proptest.workspace = true

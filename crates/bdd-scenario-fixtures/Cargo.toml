[package]
name = "adze-bdd-scenario-fixtures"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared BDD scenario fixtures and GLR conflict helpers for parser/table tests."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-bdd-governance-fixtures = { version = "0.1.0", path = "../bdd-governance-fixtures" }
adze-bdd-grammar-fixtures = { version = "0.1.0", path = "../bdd-grammar-fixtures" }

[package]
name = "adze-governance-matrix-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core governance contracts combining BDD progress and parser feature profiles."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["governance", "parser", "metadata", "bdd", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-governance-matrix-core"

[features]
default = []
pure-rust = ["adze-governance-matrix-core-impl/pure-rust"]
tree-sitter-c2rust = ["adze-governance-matrix-core-impl/tree-sitter-c2rust"]
tree-sitter-standard = ["adze-governance-matrix-core-impl/tree-sitter-standard"]
glr = ["pure-rust", "adze-governance-matrix-core-impl/glr"]
strict_api = ["adze-governance-matrix-core-impl/strict_api"]
strict_docs = ["adze-governance-matrix-core-impl/strict_docs"]

[dependencies]
adze-governance-matrix-core-impl = { version = "0.1.0", path = "../governance-matrix-core-impl" }

[dev-dependencies]
proptest = { workspace = true }

[package]
name = "adze-governance-profile-metadata"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Parser feature profile metadata snapshots for governance artifacts."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["governance", "parser", "metadata", "features", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-governance-profile-metadata"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-feature-policy-core = { version = "0.1.0", path = "../feature-policy-core" }
serde.workspace = true

[dev-dependencies]
serde_json.workspace = true

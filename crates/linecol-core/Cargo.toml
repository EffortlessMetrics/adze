[package]
name = "adze-linecol-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
readme = "README.md"
description = "Line/column byte-position tracking utilities for parser lexers and scanners."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["parser", "line-column", "position", "lexer", "scanner"]
categories = ["parsing", "text-processing"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-linecol-core"

[features]
default = []
strict_api = []
strict_docs = []

[dev-dependencies]
proptest.workspace = true
criterion.workspace = true

[[bench]]
name = "linecol_bench"
harness = false

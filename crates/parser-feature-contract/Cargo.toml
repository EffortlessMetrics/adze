[package]
name = "adze-parser-feature-contract"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared parser feature-flag contracts for backend selection."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[dependencies]
adze-feature-policy-contract = { version = "0.1.0", path = "../feature-policy-contract" }

[features]
default = []
pure-rust = ["adze-feature-policy-contract/pure-rust"]
tree-sitter-c2rust = ["adze-feature-policy-contract/tree-sitter-c2rust"]
tree-sitter-standard = ["adze-feature-policy-contract/tree-sitter-standard"]
glr = ["pure-rust", "adze-feature-policy-contract/glr"]
strict_docs = ["adze-feature-policy-contract/strict_docs"]
strict_api = ["adze-feature-policy-contract/strict_api"]

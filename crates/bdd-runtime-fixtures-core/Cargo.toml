[package]
name = "adze-bdd-runtime-fixtures-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Single-responsibility runtime token and symbol metadata fixtures for GLR BDD tests."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["bdd", "testing", "runtime", "fixtures", "grammar"]
categories = ["development-tools::testing"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-bdd-runtime-fixtures-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-ir = { version = "0.8.0-dev", path = "../../ir" }

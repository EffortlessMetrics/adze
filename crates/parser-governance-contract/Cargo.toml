[package]
name = "adze-parser-governance-contract"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core governance contracts for parser backend selection and BDD progress tracking."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["parser", "grammar", "tree-sitter", "ast", "glr"]
categories = ["parsing", "development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-parser-governance-contract"

[dependencies]
adze-bdd-governance-contract = { version = "0.1.0", path = "../bdd-governance-contract" }

[features]
default = []
pure-rust = ["adze-bdd-governance-contract/pure-rust"]
tree-sitter-standard = ["adze-bdd-governance-contract/tree-sitter-standard"]
tree-sitter-c2rust = ["adze-bdd-governance-contract/tree-sitter-c2rust"]
glr = ["pure-rust", "adze-bdd-governance-contract/glr"]
strict_api = ["adze-bdd-governance-contract/strict_api"]
strict_docs = ["adze-bdd-governance-contract/strict_docs"]

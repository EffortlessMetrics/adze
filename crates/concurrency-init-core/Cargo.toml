[package]
name = "adze-concurrency-init-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Rayon global thread-pool initialization policy for process-wide concurrency caps."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-concurrency-env-core = { version = "0.1.0", path = "../concurrency-env-core" }
adze-concurrency-init-bootstrap-core = { version = "0.1.0", path = "../concurrency-init-bootstrap-core" }
adze-concurrency-init-rayon-core = { version = "0.1.0", path = "../concurrency-init-rayon-core" }

[dev-dependencies]
proptest = "1.4"
adze-concurrency-init-classifier-core = { version = "0.1.0", path = "../concurrency-init-classifier-core" }
adze-concurrency-init-rayon-core = { version = "0.1.0", path = "../concurrency-init-rayon-core" }

[package]
name = "adze-bdd-grammar-fixtures"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Shared GLR BDD grammar and parse-table fixture helpers."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["bdd", "testing", "scenarios", "parser", "grammar"]
categories = ["development-tools::testing"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-bdd-grammar-fixtures"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-bdd-grammar-analysis-core = { version = "0.1.0", path = "../bdd-grammar-analysis-core" }
adze-glr-core = { version = "0.8.0-dev", path = "../../glr-core" }
adze-ir = { version = "0.8.0-dev", path = "../../ir" }

[dev-dependencies]
proptest = { workspace = true }

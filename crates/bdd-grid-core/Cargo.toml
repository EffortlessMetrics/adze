[package]
name = "adze-bdd-grid-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Compatibility core for BDD grid contracts + fixture datasets."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-bdd-grid-contract = { path = "../bdd-grid-contract", version = "0.1.0", default-features = false }
adze-bdd-grid-fixtures = { path = "../bdd-grid-fixtures", version = "0.1.0", default-features = false }

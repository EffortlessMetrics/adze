[package]
name = "adze-bdd-grid-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core BDD grid contracts for parser progress reporting and feature-aware status tracking."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["bdd", "testing", "scenarios", "parser", "grammar"]
categories = ["development-tools::testing"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-bdd-grid-core"

[features]
default = []
strict_api = ["adze-bdd-scenario-core/strict_api"]
strict_docs = ["adze-bdd-scenario-core/strict_docs"]

[dependencies]
adze-bdd-scenario-core = { version = "0.1.0", path = "../bdd-scenario-core" }

[dev-dependencies]
criterion.workspace = true
proptest = { workspace = true }

[[bench]]
name = "bdd_grid_bench"
harness = false

[package]
name = "adze-runtime2-governance"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Runtime2-specific governance helpers for parser feature profiles and BDD reporting."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["governance", "parser", "metadata", "bdd", "policy"]
categories = ["development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-runtime2-governance"

[features]
default = []
strict_api = ["adze-runtime-governance-matrix/strict_api"]
strict_docs = ["adze-runtime-governance-matrix/strict_docs"]

[dependencies]
adze-runtime-governance-matrix = { version = "0.1.0", path = "../runtime-governance-matrix" }

[dev-dependencies]
proptest = { workspace = true }

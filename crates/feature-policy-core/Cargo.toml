[package]
name = "adze-feature-policy-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Core parser feature-policy contracts shared by governance layers."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates-io"]
keywords = ["parser", "grammar", "tree-sitter", "ast", "glr"]
categories = ["parsing", "development-tools"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-feature-policy-core"

[features]
default = []
pure-rust = [
    "adze-parser-backend-core/pure-rust",
    "adze-parser-feature-profile-core/pure-rust",
]
tree-sitter-c2rust = [
    "adze-parser-backend-core/tree-sitter-c2rust",
    "adze-parser-feature-profile-core/tree-sitter-c2rust",
]
tree-sitter-standard = [
    "adze-parser-backend-core/tree-sitter-standard",
    "adze-parser-feature-profile-core/tree-sitter-standard",
]
glr = [
    "pure-rust",
    "adze-parser-backend-core/glr",
    "adze-parser-feature-profile-core/glr",
]
strict_docs = []
strict_api = []

[dependencies]
adze-parser-backend-core = { version = "0.1.0", path = "../parser-backend-core" }
adze-parser-feature-profile-core = { version = "0.1.0", path = "../parser-feature-profile-core" }

[dev-dependencies]
adze-parser-backend-core = { version = "0.1.0", path = "../parser-backend-core" }
proptest = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "bench_policy"
harness = false

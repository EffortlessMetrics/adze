[package]
name = "adze-concurrency-plan-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
description = "Pure policy helpers for normalized concurrency and bounded parallel partitioning."
repository = "https://github.com/EffortlessMetrics/adze"
publish = ["crates.io"]
keywords = ["concurrency", "threading", "caps", "parallel", "rayon"]
categories = ["concurrency"]
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-concurrency-plan-core"

[features]
default = []
strict_api = []
strict_docs = []

[dependencies]
adze-concurrency-normalize-core = { version = "0.1.0", path = "../concurrency-normalize-core" }

[dev-dependencies]
proptest.workspace = true
adze-concurrency-normalize-core = { version = "0.1.0", path = "../concurrency-normalize-core" }

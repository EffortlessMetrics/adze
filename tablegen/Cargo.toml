[package]
name = "rust-sitter-tablegen"
version = "0.1.0"
edition = "2021"
description = "Static table generation and compression for pure-Rust Tree-sitter"

[dependencies]
rust-sitter-ir = { path = "../ir" }
rust-sitter-glr-core = { path = "../glr-core" }
proc-macro2 = "1.0"
quote = "1.0"
indexmap = { version = "2.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

# Use the same tree-sitter backend as rust-sitter runtime
tree-sitter-c2rust = { version = "0.25.2", optional = true }
tree-sitter = { version = "0.25.2", optional = true }

[features]
default = ["tree-sitter-c2rust"]
tree-sitter-standard = ["tree-sitter"]

[dev-dependencies]
insta = "1.0"
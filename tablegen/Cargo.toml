[package]
name = "rust-sitter-tablegen"
version = "0.8.0-dev"
edition.workspace = true
rust-version.workspace = true
description = "Table generation and compression for pure-Rust Tree-sitter"
license = "MIT OR Apache-2.0"
repository = "https://github.com/EffortlessMetrics/rust-sitter"
homepage = "https://github.com/EffortlessMetrics/rust-sitter"
documentation = "https://docs.rs/rust-sitter-tablegen"
readme = "README.md"
publish = false
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**",
    "MIGRATING.md"
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
features = ["strict_docs"]

[dependencies]
rust-sitter-ir = { version = "0.8.0-dev", path = "../ir" }
rust-sitter-glr-core = { version = "0.8.0-dev", path = "../glr-core", features = ["serialization"] }
proc-macro2 = "1.0"
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
indexmap = "2.0"
rustc-hash = "2.1"

# Parsetable file generation dependencies
sha2 = "0.10"
chrono = { version = "0.4", features = ["std", "clock"], default-features = false }
rustc_version_runtime = "0.3"

# Tree-sitter backends
tree-sitter = { version = "0.25.2", optional = true }
tree-sitter-c2rust = { version = "0.25.2", optional = true }

[dev-dependencies]
proptest = "1.5"
insta = "1.40"
rustc-hash = "2.1"
criterion = "0.5"

[[bench]]
name = "compression"
harness = false

[features]
default = ["tree-sitter-c2rust", "serialization"]
tree-sitter-standard = ["tree-sitter"]
tree-sitter-c2rust = ["dep:tree-sitter-c2rust"]
compression = [] # Feature for compression/decompression utilities
small-table = [] # Feature for compressed table generation
serialization = [] # Feature for .parsetable file generation
strict_docs = []  # Feature flag for strict documentation enforcement
strict_api = []  # Feature flag for strict API surface checking

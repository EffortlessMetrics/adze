[package]
name = "rust-sitter-tablegen"
version = "0.6.0"
edition = "2024"
description = "Table generation and compression for pure-Rust Tree-sitter"
license = "MIT"
repository = "https://github.com/hydro-project/rust-sitter"
homepage = "https://github.com/hydro-project/rust-sitter"
documentation = "https://docs.rs/rust-sitter-tablegen"

[dependencies]
rust-sitter-ir = { version = "0.6.0", path = "../ir" }
rust-sitter-glr-core = { version = "0.6.0", path = "../glr-core" }
proc-macro2 = "1.0"
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
indexmap = "2.0"
rustc-hash = "2.1"

# Tree-sitter backends
tree-sitter = { version = "0.25.2", optional = true }
tree-sitter-c2rust = { version = "0.25.2", optional = true }

[dev-dependencies]
proptest = "1.5"
insta = "1.40"
rustc-hash = "2.1"

[features]
default = ["tree-sitter-c2rust"]
tree-sitter-standard = ["tree-sitter"]
tree-sitter-c2rust = ["dep:tree-sitter-c2rust"]
[package]
name = "rust-sitter-ir"
version = "0.6.0"
edition = "2024"
rust-version = "1.87"
description = "Grammar Intermediate Representation for pure-Rust Tree-sitter"
license = "MIT"
repository = "https://github.com/hydro-project/rust-sitter"
homepage = "https://github.com/hydro-project/rust-sitter"
documentation = "https://docs.rs/rust-sitter-ir"
readme = "README.md"
publish = false
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**"
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
indexmap = { version = "2.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
anyhow = "1.0"

[features]
default = []
optimize = []
strict_docs = []

[dev-dependencies]
insta = "1.0"
[package]
name = "rust-sitter-ir"
version = "0.1.0"
edition = "2021"
description = "Grammar Intermediate Representation for pure-Rust Tree-sitter"

[dependencies]
indexmap = { version = "2.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
insta = "1.0"
[package]
name = "adze-ir"
version = "0.8.0-dev"
edition.workspace = true
rust-version.workspace = true
description = "Grammar Intermediate Representation for Adze"
license = "MIT OR Apache-2.0"
repository = "https://github.com/EffortlessMetrics/adze"
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-ir"
readme = "../README.md"
publish = true
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**"
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
indexmap = { version = "2.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
anyhow = "1.0"

[features]
default = []
optimize = []
strict_docs = []

[dev-dependencies]
insta = "1.0"

[package]
name = "rust-sitter-ir"
version = "0.5.0-beta"
edition = "2024"
description = "Grammar Intermediate Representation for pure-Rust Tree-sitter"
license = "MIT"
repository = "https://github.com/hydro-project/rust-sitter"
homepage = "https://github.com/hydro-project/rust-sitter"
documentation = "https://docs.rs/rust-sitter-ir"

[dependencies]
indexmap = { version = "2.0", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"

[features]
default = []
optimize = []

[dev-dependencies]
insta = "1.0"
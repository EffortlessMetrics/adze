# Cargo configuration for adze

[build]
# Number of parallel jobs, defaults to # of CPUs (0 is invalid, remove to use default)
rustflags = [
  "--check-cfg=cfg(feature, values(\"perf-counters\",\"test-api\",\"strict-invariants\",\"memory-tests\",\"json-parity\",\"with-grammars\",\"external_scanners\",\"incremental_glr\",\"strict_docs\"))",
  "-Awarnings"  # Suppress warnings for quieter builds (helps prevent Node wrapper crashes)
]

[term]
# Quiet terminal output to prevent Node wrapper crashes from excessive output
color = "never"
progress.when = "never"

[profile.dev]
# Faster compilation at the cost of runtime performance
opt-level = 0
debug = true
incremental = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
inherits = "release"
debug = true

# Profile for CI builds - faster than release but still optimized
[profile.ci]
inherits = "release"
opt-level = 2
lto = false
codegen-units = 16

# Profile for fuzzing
[profile.fuzz]
inherits = "dev"
opt-level = 3
overflow-checks = false

[target.x86_64-unknown-linux-gnu]
# Use mold linker on Linux for faster builds (if available)
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[alias]
# Useful aliases
xtask = "run --package xtask --"
lint = "xtask lint"
ci = "clippy --workspace --all-targets --all-features -- -D warnings"
test-all = "test --workspace --all-features"
# Fixed recursive alias - renamed to 'nxt' to avoid shadowing
nxt = "nextest run --workspace --all-features"

# Concurrency-capped test aliases
t2 = "test -- --test-threads=2"
t1 = "test -- --test-threads=1"
t4 = "test -- --test-threads=4"
test-safe = "test -- --test-threads=2"
test-ultra-safe = "test -- --test-threads=1"
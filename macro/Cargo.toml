[package]
name = "adze-macro"
description = "Procedural macros for Adze"
readme = "../README.md"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"
publish = true
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
proc-macro = true
path = "src/lib.rs"

[features]
pure-rust = []
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"
proc-macro2 = "1"
adze-common = { version = "0.8.0-dev", path = "../common" }

[dev-dependencies]
insta = "1.39"
tempfile = "3"
trybuild = "1.0"
adze = { version = "0.8.0-dev", path = "../runtime" }

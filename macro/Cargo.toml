[package]
name = "adze-macro"
description = "Procedural macros for Adze"
readme = "../README.md"
repository = "https://github.com/EffortlessMetrics/adze"
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-macro"
version = "0.8.0-dev"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
rust-version.workspace = true
license = "MIT OR Apache-2.0"
publish = true
keywords = ["parsing", "codegen"]
categories = ["development-tools"]
include = [
    "Cargo.toml",
    "/LICENSE*",
    "/README*",
    "src/**"
]

[lib]
proc-macro = true
path = "src/lib.rs"

[features]
pure-rust = []
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn.workspace = true
quote.workspace = true
proc-macro2.workspace = true
adze-common = { version = "0.8.0-dev", path = "../common" }

[dev-dependencies]
insta.workspace = true
tempfile.workspace = true
trybuild = "1.0"
adze = { version = "0.8.0-dev", path = "../runtime" }
syn.workspace = true
quote.workspace = true
proc-macro2.workspace = true
proptest.workspace = true
adze-common = { version = "0.8.0-dev", path = "../common" }

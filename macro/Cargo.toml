[package]
name = "adze-macro"
description = "Procedural macros for Adze"
readme = "README.md"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
homepage = "https://github.com/EffortlessMetrics/adze"
keywords = ["parsing", "codegen", "grammar", "proc-macro"]
categories = ["development-tools"]

[lib]
proc-macro = true
path = "src/lib.rs"

[features]
pure-rust = []
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"
proc-macro2 = "1"
adze-common = { version = "0.8.0-dev", path = "../common" }

[dev-dependencies]
insta = "1.39"
tempfile = "3"
trybuild = "1.0"
adze = { version = "0.8.0-dev", path = "../runtime" }

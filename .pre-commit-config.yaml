# Pre-commit hooks for rust-sitter
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for available hooks

# Installation (automatic in Nix shell):
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
#
# Bypass (for WIP commits):
#   git commit --no-verify

repos:
  - repo: local
    hooks:
      # Formatting check (fast: ~1s)
      - id: cargo-fmt
        name: Cargo Format Check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
        description: "Ensures all Rust code is formatted with cargo fmt"

      # Linting check (medium: ~3s for changed files)
      - id: cargo-clippy
        name: Cargo Clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        description: "Ensures code passes clippy with zero warnings"

      # Test connectivity check (fast: <1s)
      - id: test-connectivity
        name: Test Connectivity Check
        entry: bash -c 'if find . -name "*.rs.disabled" | grep -q .; then echo "❌ Found .rs.disabled files (tests disconnected)"; find . -name "*.rs.disabled"; exit 1; fi'
        language: system
        pass_filenames: false
        description: "Prevents .rs.disabled files (use #[ignore] instead)"

      # Large file check (fast: <1s)
      - id: large-files
        name: Prevent Large Files
        entry: bash -c 'for file in $(git diff --cached --name-only); do if [ -f "$file" ]; then size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null); if [ "$size" -gt 1048576 ]; then echo "⚠️  Large file detected: $file ($(($size / 1024 / 1024)) MB)"; echo "Consider: Git LFS, compression, or external hosting"; exit 1; fi; fi; done'
        language: system
        pass_filenames: false
        description: "Warns about files >1MB"

  # Commit message validation (runs on commit-msg stage)
  - repo: local
    hooks:
      - id: commit-msg-validation
        name: Commit Message Validation
        entry: bash -c 'if ! grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}" "$1"; then echo "❌ Commit message does not follow Conventional Commits format"; echo ""; echo "Expected format:"; echo "  <type>(<scope>): <subject>"; echo ""; echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"; echo ""; echo "Examples:"; echo "  feat(parser): add incremental parsing support"; echo "  fix(glr): resolve shift/reduce conflict in state 0"; echo "  docs: update README with Nix installation"; exit 1; fi'
        language: system
        stages: [commit-msg]
        description: "Validates commit message follows Conventional Commits"

# Configuration
default_language_version:
  python: python3

fail_fast: false  # Run all hooks even if one fails

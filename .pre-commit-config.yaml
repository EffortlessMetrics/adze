repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (workspace)
        entry: bash -c 'cargo fmt --all -- --check'
        language: system
        pass_filenames: false
        files: '\.rs$'

      - id: cargo-clippy
        name: cargo clippy (all targets, all features)
        entry: bash -c 'cargo clippy --workspace --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        files: '\.rs$'

      - id: cargo-test-core
        name: cargo test glr-core (test-helpers)
        entry: bash -c 'cargo test -p rust-sitter-glr-core --features test-helpers --quiet'
        language: system
        pass_filenames: false
        files: 'glr-core/.*\.rs$'

      - id: cargo-test-tools
        name: cargo test ts-bridge
        entry: bash -c 'cargo test -p ts-bridge --quiet'
        language: system
        pass_filenames: false
        files: 'tools/ts-bridge/.*\.rs$'

      - id: contract-tripwires
        name: contract tripwires (EOF & stats)
        language: system
        pass_filenames: false
        entry: |
          bash -c '
            set -euo pipefail
            # No stubbed stats
            ! rg -n "-> \(false, 0, 0\)" glr-core | tee /dev/stderr | grep -q .
            # No stray "Unknown action type" decoders without V/Recover
            ! rg -n "Unknown action type" glr-core tablegen runtime --glob "*.rs" | grep -v "// Expected: V for Recover" | tee /dev/stderr | grep -q .
          '
        files: '(glr-core|tablegen|runtime)/.*\.rs$'

      - id: tables-sanity
        name: EOF/END parity & invariants (fast)
        language: system
        pass_filenames: false
        entry: bash -c '
          set -euo pipefail
          # Run just the tiny, deterministic tests that encode the invariants:
          cargo test -p rust-sitter-glr-core --test test_eof_fix --quiet
          cargo test -p rust-sitter-glr-core --test test_eof_column_parity --quiet
          cargo test -p rust-sitter-glr-core --test test_accept_via_insertion --quiet
          cargo test -p rust-sitter-glr-core --test test_error_stats_tripwire --quiet
        '
        files: 'glr-core/.*\.rs$'

      - id: test-connectivity-check
        name: test connectivity check
        language: system
        pass_filenames: false
        entry: bash -c '
          set -euo pipefail
          # Check for disabled test files
          if find . -name "*.rs.disabled" -type f | grep -q .; then
            echo "ERROR: Found disabled test files:"
            find . -name "*.rs.disabled" -type f
            echo "Use #[ignore] attribute instead of renaming files"
            exit 1
          fi
        '
        files: '\.rs\.disabled$'

      - id: cargo-deny
        name: cargo deny (advisories & licenses)
        entry: bash -c 'command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --quiet; cargo deny check advisories licenses'
        language: system
        pass_filenames: false
        files: 'Cargo\.(toml|lock)$'
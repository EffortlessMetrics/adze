[workspace]
resolver = "2"
members = [
  "macro",
  "runtime",
  "runtime2",
  "tool",
  "example",
  "common",
  "ir",
  "glr-core",
  "tablegen",
  "xtask",
  "testing",
  "grammars/javascript",
  "grammars/python",
  "grammars/python-simple",
  "grammars/test-vec-wrapper",
  "grammars/go",
  "lsp-generator",
  "playground",
  "samples/downstream-demo",
  "cli",
  "benchmarks",
  "test-mini",
  "golden-tests",
  "wasm-demo",
  "tools/ts-bridge",
]
exclude = ["runtime/fuzz"]

[workspace.package]
rust-version = "1.75"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "deny"
unused_must_use = "deny"
missing_docs = "warn"

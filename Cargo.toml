[workspace]
resolver = "2"
members = [
  "macro",
  "runtime",
  "runtime2",
  "tool",
  "common",
  "ir",
  "glr-core",
  "glr-test-support",
  "tablegen",
  "xtask",
  "testing",
  "grammars/javascript",
  "grammars/python",
  "grammars/python-simple",
  "grammars/test-vec-wrapper",
  "grammars/go",
  "lsp-generator",
  "playground",
  "samples/downstream-demo",
  "cli",
  "benchmarks",
  "test-mini",
  "golden-tests",
  "wasm-demo",
]
# These crates are intentionally excluded from default workspace commands
# due to mutually exclusive features. Build them explicitly with -p when needed.
exclude = [
  "runtime/fuzz",
  "tools/ts-bridge",      # build separately to enable grammar features
  "crates/ts-c-harness",   # relies on external C/TS libs
  "example",               # has mutually exclusive pure-rust/c-backend features
]

[workspace.package]
rust-version = "1.89"
edition = "2024"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "deny"
unused_must_use = "deny"
missing_docs = "warn"
unused_extern_crates = "deny"

[workspace.dependencies]
tree-sitter = "=0.25.8"

[profile.ci]
inherits = "dev"
debug = 0
lto = "off"

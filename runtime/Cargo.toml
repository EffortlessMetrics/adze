[package]
name = "rust-sitter"
description = "A package for defining tree-sitter grammars alongside Rust logic"
readme = "../README.md"
repository = "https://github.com/hydro-project/rust-sitter"
version = "0.8.0-dev"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
license = "MIT"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
default = ["pure-rust"]
pure-rust = ["rust-sitter-macro/pure-rust"]
tree-sitter-c2rust = ["tree-sitter-runtime-c2rust"]
tree-sitter-standard = ["tree-sitter-runtime-standard"]
wasm = ["wasm-bindgen", "pure-rust"]
simd = ["pure-rust"]
serialization = ["serde", "serde_json"] # Enable tree serialization
legacy-parsers = [] # Enable to access deprecated parser_v2 and parser_v3 modules
incremental_glr = [] # Enable GLR incremental parsing support
debug_glr = [] # Enable debug output for GLR parser
debug_incremental = [] # Enable debug output for incremental parsing
experimental_examples = [] # Enable experimental examples that use internal APIs
external_scanners = [] # Enable external scanner support (feature-gated)
query = [] # Enable query predicates support
runtime-e2e = [] # Opt-in integration tests that exercise end-to-end parsing paths
strict_docs = [] # Enable strict documentation requirements
strict_api = [] # Enable strict API surface checking

[dependencies]
tree-sitter-runtime-c2rust = { package = "tree-sitter-c2rust", version = "0.25.2", optional = true }
tree-sitter-runtime-standard = { package = "tree-sitter", version = "0.25.8", optional = true }
rust-sitter-macro = { version = "0.8.0-dev", path = "../macro" }
rust-sitter-ir = { version = "0.8.0-dev", path = "../ir" }
rust-sitter-glr-core = { version = "0.8.0-dev", path = "../glr-core" }
rust-sitter-tablegen = { version = "0.8.0-dev", path = "../tablegen" }
regex = "1.11.1"
serde = { version = "1.0.219", features = ["derive"], optional = true }
serde_json = { version = "1.0.142", optional = true }
anyhow = "1.0.98"
indexmap = "2.10.0"
once_cell = "1.19"
thiserror = "2.0.12"
rayon = "1.10.0"
ahash = "0.8.12"
log = "0.4.27"
wasm-bindgen = { version = "0.2.100", optional = true }

[dev-dependencies]
insta = "1.43.1"
tempfile = "3.20.0"
criterion = { version = "0.5", features = ["html_reports"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.142"
proptest = "1.4"
hex = "0.4"
glr-test-support = { path = "../glr-test-support" }

[[bench]]
name = "simple_bench"
harness = false

[[bench]]
name = "parser_benchmark"
harness = false

[[bench]]
name = "glr_parser_bench"
harness = false

[[bench]]
name = "incremental_parsing"
harness = false

[[bench]]
name = "incremental_benchmark"
harness = false

[[bench]]
name = "incremental_simple"
harness = false

[[example]]
name = "external_scanner_demo"
required-features = ["experimental_examples"]

[[example]]
name = "glr_incremental_demo"
required-features = ["experimental_examples", "incremental_glr"]

[[example]]
name = "glr_incremental_simple"
required-features = ["experimental_examples", "incremental_glr"]

[[example]]
name = "incremental_demo"
required-features = ["experimental_examples"]

[[example]]
name = "json_parser_example"
required-features = ["experimental_examples"]

[[example]]
name = "predicate_demo"
required-features = ["experimental_examples"]

[[example]]
name = "pure_parser_demo"
required-features = ["experimental_examples", "pure-rust"]

[[example]]
name = "validation_demo"
required-features = ["experimental_examples"]

[package]
name = "rust-sitter"
description = "A package for defining tree-sitter grammars alongside Rust logic"
readme = "../README.md"
repository = "https://github.com/hydro-project/rust-sitter"
version = "1.0.0"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
license = "MIT"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
default = ["pure-rust"]
pure-rust = ["rust-sitter-macro/pure-rust"]
tree-sitter-c2rust = ["tree-sitter-runtime-c2rust"]
tree-sitter-standard = ["tree-sitter-runtime-standard"]
serialization = ["serde", "serde_json"]
wasm = ["wasm-bindgen", "pure-rust"]
simd = ["pure-rust"]

[dependencies]
tree-sitter-runtime-c2rust = { package = "tree-sitter-c2rust", version = "0.25.2", optional = true }
tree-sitter-runtime-standard = { package = "tree-sitter", version = "0.25.2", optional = true }
rust-sitter-macro = { version = "1.0.0", path = "../macro" }
rust-sitter-ir = { version = "1.0.0", path = "../ir" }
rust-sitter-glr-core = { version = "1.0.0", path = "../glr-core" }
rust-sitter-tablegen = { version = "1.0.0", path = "../tablegen" }
regex = "1.10"
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
anyhow = "1.0"
indexmap = "2.0"
thiserror = "1.0"
rayon = "1.7"
ahash = "0.8"
log = "0.4"
wasm-bindgen = { version = "0.2", optional = true }

[dev-dependencies]
insta = "1.39"
tempfile = "3.2.0"
criterion = { version = "0.5", features = ["html_reports"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[[bench]]
name = "simple_bench"
harness = false

[[bench]]
name = "parser_benchmark"
harness = false

[[bench]]
name = "glr_parser_bench"
harness = false

[[bench]]
name = "incremental_parsing"
harness = false

[[bench]]
name = "incremental_benchmark"
harness = false

[[bench]]
name = "incremental_simple"
harness = false

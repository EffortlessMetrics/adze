[package]
name = "rust-sitter-playground"
version = "0.1.0"
edition = "2024"

[dependencies]
rust-sitter = { path = "../runtime" }
rust-sitter-ir = { path = "../ir" }
rust-sitter-glr-core = { path = "../glr-core" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
axum = "0.6"
tower-http = { version = "0.4", features = ["cors"] }
colored = "2.0"
clap = { version = "4.0", features = ["derive"] }

[[bin]]
name = "rust-sitter-playground"
path = "src/bin/playground.rs"
[package]
name = "rust-sitter-testing"
version = "0.1.0"
edition = "2024"

[dependencies]
rust-sitter = { path = "../runtime" }
rust-sitter-ir = { path = "../ir" }
rust-sitter-glr-core = { path = "../glr-core" }
rust-sitter-tool = { path = "../tool" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
tempfile = "3.0"
clap = { version = "4.0", features = ["derive"] }

[dev-dependencies]
insta = "1.0"
name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below
        so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Define this grammar: ...
        2. Parse this input: ...
        3. See error: ...
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, panic output, or incorrect parse trees.
    validations:
      required: true

  - type: input
    id: adze-version
    attributes:
      label: Adze Version
      description: Output of `cargo tree -p adze` or the git commit SHA.
      placeholder: "0.7.0 / main@abc1234"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`.
      placeholder: "rustc 1.89.0 (xxx 2025-xx-xx)"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Tree-sitter Backend
      description: Which backend are you using?
      options:
        - tree-sitter-c2rust (default, pure Rust)
        - tree-sitter-standard (C runtime)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What OS are you running on?
      options:
        - Linux
        - macOS
        - Windows
        - WebAssembly (wasm32)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help (logs, screenshots, related issues).

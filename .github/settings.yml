# .github/settings.yml
# Managed by probot/settings — https://github.com/probot/settings

repository:
  name: adze
  description: "Adze: Rust-native grammar toolchain with GLR-capable parsing and typed extraction. Tree-sitter interoperable (not affiliated)."
  homepage: https://github.com/EffortlessMetrics/adze
  topics: adze, parsing, rust, glr-parsing, parser-generator, grammar, codegen, incremental-parsing, tree-sitter, compiler
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false
  default_branch: main
  allow_squash_merge: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: BLANK
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  allow_update_branch: true
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - "CI / ci-supported"
      enforce_admins: true
      required_linear_history: true
      required_conversation_resolution: true
      allow_force_pushes: false
      allow_deletions: false
      restrictions: null

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working
  - name: enhancement
    color: a2eeef
    description: New feature or request
  - name: docs
    color: 0075ca
    description: Improvements or additions to documentation
  - name: breaking-change
    color: d93f0b
    description: Introduces a breaking change
  - name: ci
    color: "5319e7"
    description: CI/CD pipeline changes
  - name: tests
    color: "1d76db"
    description: Test suite changes
  - name: perf
    color: c5def5
    description: Performance improvements
  - name: security
    color: e11d21
    description: Security-related issue
  - name: refactor
    color: bfd4f2
    description: Code refactoring
  - name: deps
    color: fef2c0
    description: Dependency updates
  - name: known-red
    color: b60205
    description: Known failing test or issue tracked in KNOWN_RED.md
  - name: release
    color: "006b75"
    description: Release preparation
  - name: good first issue
    color: "7057ff"
    description: Good for newcomers

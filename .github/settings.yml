repository:
  # See https://developer.github.com/v3/repos/#edit for all available settings.
  name: rust-sitter
  description: A package for defining tree-sitter grammars alongside Rust logic
  homepage: https://github.com/EffortlessMetrics/rust-sitter
  topics: rust, parsing, tree-sitter, codegen, incremental-parsing, glr-parsing
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - "CI / Lint"
          - "core-tests / core"
      enforce_admins: false
      restrictions: null

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation
  - name: duplicate
    color: cfd3d7
    description: This issue or pull request already exists
  - name: enhancement
    color: a2eeef
    description: New feature or request
  - name: good first issue
    color: 7057ff
    description: Good for newcomers
  - name: help wanted
    color: 008672
    description: Extra attention is needed
  - name: invalid
    color: e4e669
    description: This doesn't seem right
  - name: question
    color: d876e3
    description: Further information is requested
  - name: wontfix
    color: ffffff
    description: This will not be worked on
  - name: performance
    color: f9d0c4
    description: Performance improvements
  - name: breaking-change
    color: d93f0b
    description: Introduces a breaking change
  - name: technical-debt
    color: e11d21
    description: Refactoring or cleanup

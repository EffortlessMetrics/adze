name: core-tests
on: [push, pull_request]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run core tests with test-api and perf-counters
        run: cargo test -p rust-sitter-glr-core --features test-api,perf-counters --lib --tests
      
      - name: Compile benches (no perf counters)
        run: cargo bench -p rust-sitter-glr-core --no-run
      
      - name: Compile benches (with perf counters)
        run: cargo bench -p rust-sitter-glr-core --features perf-counters --no-run
      
      - name: Check all targets, all features (deny warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --workspace --all-targets --all-features
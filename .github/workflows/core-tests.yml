name: core-tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # nightly canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Tree-sitter development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libtree-sitter-dev pkg-config
      
      - name: Format (rustfmt)
        run: cargo fmt --all -- --check
      
      - name: Run core tests with test-api and perf-counters
        run: cargo test -p adze-glr-core --features test-api,perf-counters --lib --tests --locked
      
      - name: Compile benches (no perf counters)
        run: cargo bench -p adze-glr-core --no-run --locked
      
      - name: Compile benches (with perf counters)
        run: cargo bench -p adze-glr-core --features perf-counters --no-run --locked
      
      - name: Check all targets, all features (deny warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --workspace --all-targets --all-features --locked
      
      - name: Clippy (all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
      - name: Docs compilation check
        run: cargo doc --workspace --no-deps --locked
      
      - name: Check no-default-features (core crates only)
        env:
          CORE_CRATES_NO_DEFAULT: "adze-glr-core adze-ir adze-tablegen adze-common adze-macro"
        run: |
          set -euxo pipefail
          for krate in $CORE_CRATES_NO_DEFAULT; do
            echo "Checking $krate (no-default-features)"
            cargo check --no-default-features -p "$krate" --locked
          done
      
      - name: Check GLR core with all features
        run: cargo check -p adze-glr-core --features "perf-counters test-api" --locked
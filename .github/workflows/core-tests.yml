name: core-tests
on: [push, pull_request]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      
      - name: Format (rustfmt)
        run: cargo fmt --all -- --check
      
      - name: Run core tests with test-api and perf-counters
        run: cargo test -p rust-sitter-glr-core --features test-api,perf-counters --lib --tests
      
      - name: Compile benches (no perf counters)
        run: cargo bench -p rust-sitter-glr-core --no-run
      
      - name: Compile benches (with perf counters)
        run: cargo bench -p rust-sitter-glr-core --features perf-counters --no-run
      
      - name: Check all targets, all features (deny warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo check --workspace --all-targets --all-features
      
      - name: Clippy (all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
      - name: Docs compilation check
        run: cargo doc --workspace --no-deps
      
      - name: Check no-default-features (core crates only)
        env:
          CORE_CRATES_NO_DEFAULT: "rust-sitter-glr-core rust-sitter-ir rust-sitter-tablegen rust-sitter-common rust-sitter-macro"
        run: |
          for krate in $CORE_CRATES_NO_DEFAULT; do
            echo "Checking $krate (no-default-features)"
            cargo check --no-default-features -p "$krate"
          done
      
      - name: Check GLR core with all features
        run: cargo check -p rust-sitter-glr-core --features "perf-counters test-api"
name: Test Policy Enforcement

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: 2
  RAYON_NUM_THREADS: 4
  TOKIO_WORKER_THREADS: 2
  TOKIO_BLOCKING_THREADS: 8
  CARGO_BUILD_JOBS: 2
  OMP_NUM_THREADS: 1
  OPENBLAS_NUM_THREADS: 1
  MKL_NUM_THREADS: 1
  NUMEXPR_NUM_THREADS: 1

jobs:
  test-policy:
    name: Enforce Test Policy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check for undocumented ignored tests
        run: |
          echo "Checking for #[ignore] without documentation..."

          # Find all #[ignore] attributes
          ignored_count=$(find . -name "*.rs" -type f -exec grep -l "#\[ignore" {} \; | wc -l)
          echo "Found $ignored_count files with #[ignore]"

          # Check each one has a reason
          undocumented=0
          while IFS= read -r file; do
            # Check if #[ignore] has a reason (= "...")
            if grep "#\[ignore\]$" "$file" > /dev/null; then
              echo "❌ Undocumented #[ignore] in $file"
              grep -n "#\[ignore\]$" "$file"
              undocumented=$((undocumented + 1))
            fi
          done < <(find . -name "*.rs" -type f -exec grep -l "#\[ignore" {} \;)

          if [ $undocumented -gt 0 ]; then
            echo "::error::Found $undocumented undocumented #[ignore] attributes"
            echo "All #[ignore] must have a reason: #[ignore = \"reason\"]"
            exit 1
          fi

          echo "✅ All #[ignore] attributes are documented"

      - name: Verify minimum test counts
        run: |
          echo "Verifying minimum test counts per crate..."

          # Directory -> package mapping
          declare -A crate_packages=(
            ["runtime"]="adze"
            ["macro"]="adze-macro"
            ["glr-core"]="adze-glr-core"
            ["tablegen"]="adze-tablegen"
            ["tool"]="adze-tool"
          )

          # Define minimum test counts (from TEST_INVENTORY.md policy), keyed by directory
          declare -A min_counts=(
            ["runtime"]=50
            ["macro"]=11
            ["glr-core"]=30
            ["tablegen"]=8
            ["tool"]=10
          )

          failed=false

          for crate in "${!min_counts[@]}"; do
            if [ -d "$crate" ]; then
              package="${crate_packages[$crate]}"
              required="${min_counts[$crate]}"

              if [ -z "$package" ]; then
                echo "::error::No package mapping found for crate directory '$crate'"
                failed=true
                continue
              fi

              echo "Checking $crate ($package)..."

              if ! test_list=$(cargo test -p "$package" --lib --tests -- --list 2>/dev/null); then
                echo "::error::Failed to list tests for $crate ($package)"
                failed=true
                continue
              fi

              # cargo test -- --list format ends test cases with ": test"
              actual=$(printf '%s\n' "$test_list" | awk '/: test$/{count++} END{print count+0}')

              echo "$crate: $actual tests (minimum: $required)"

              if [ "$actual" -lt "$required" ]; then
                echo "::error::$crate has $actual tests, but requires at least $required"
                failed=true
              fi
            fi
          done

          if [ "$failed" = true ]; then
            echo "❌ Some crates below minimum test requirements"
            exit 1
          fi

          echo "✅ All crates meet minimum test requirements"

      - name: Check for .rs.disabled files
        run: |
          echo "Checking for disabled test files..."

          disabled_files=$(find . -name "*.rs.disabled" -type f)

          if [ -n "$disabled_files" ]; then
            echo "::error::Found .rs.disabled files:"
            echo "$disabled_files"
            echo "Use #[ignore = \"reason\"] instead of renaming files"
            exit 1
          fi

          echo "✅ No .rs.disabled files found"

      - name: Verify test categorization
        run: |
          echo "Checking test categorization..."

          # Count tests with category documentation
          categorized=$(find . -name "*.rs" -type f -path "*/tests/*" -exec grep -l "/// Category:" {} \; | wc -l)
          total_test_files=$(find . -name "*.rs" -type f -path "*/tests/*" | wc -l)

          if [ "$total_test_files" -gt 0 ]; then
            percentage=$((categorized * 100 / total_test_files))
            echo "Categorized test files: $categorized / $total_test_files ($percentage%)"

            # Warn if less than 50% categorized (not a hard failure yet)
            if [ "$percentage" -lt 50 ]; then
              echo "::warning::Only $percentage% of test files have category documentation"
              echo "Add /// Category: [UNIT|INTEGRATION|E2E|etc] to test files"
            fi
          fi

          echo "✅ Test categorization check complete"

      - name: Generate test inventory report
        run: |
          echo "Generating test inventory report..."

          # Run the inventory script if it exists
          if [ -f "scripts/test-inventory.sh" ]; then
            chmod +x scripts/test-inventory.sh
            ./scripts/test-inventory.sh || true

            # Upload as artifact
            if [ -f "TEST_INVENTORY_REPORT.md" ]; then
              echo "Report generated successfully"
            fi
          fi

      - name: Upload test inventory
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: test-inventory-report
          path: TEST_INVENTORY_REPORT.md
          if-no-files-found: warn

      - name: Check test execution time
        run: |
          set -o pipefail
          echo "Running tests with timeout enforcement..."

          # Cargo injects the Rust sysroot libdir when it runs test binaries.
          # Recreate that environment before invoking the binaries directly.
          cargo_target_libdir="$(rustc --print target-libdir)"
          export LD_LIBRARY_PATH="$cargo_target_libdir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          # Directory -> package mapping for timeout lane
          declare -A crate_packages=(
            ["runtime"]="adze"
            ["macro"]="adze-macro"
            ["glr-core"]="adze-glr-core"
            ["tablegen"]="adze-tablegen"
            ["tool"]="adze-tool"
            ["ir"]="adze-ir"
            ["common"]="adze-common"
          )

          # Run tests with 60s timeout per crate (compilation separated)
          for crate in runtime macro glr-core tablegen tool ir common; do
            if [ -d "$crate" ]; then
              package="${crate_packages[$crate]}"
              if [ -z "$package" ]; then
                echo "::error::No package mapping found for crate directory '$crate'"
                exit 1
              fi

              echo "Compiling $crate ($package) and capturing test binaries..."

              test_bins_file=$(mktemp)
              trap 'rm -f "$test_bins_file"' EXIT

              # Compile once, then execute the produced test binaries under the runtime budget.
              timeout -k 10s 180s cargo test -p "$package" --lib --tests --no-run --message-format=json \
                | jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .executable != null) | .executable' \
                | sort -u > "$test_bins_file" || {
                exit_code=$?
                if [ $exit_code -eq 124 ] || [ $exit_code -eq 137 ]; then
                  if [ $exit_code -eq 137 ]; then
                    echo "::error::Compilation for $crate exceeded 180s timeout and was force-killed"
                  else
                    echo "::error::Compilation for $crate exceeded 180s timeout"
                  fi
                  exit 1
                else
                  echo "::error::Compilation for $crate failed with exit code $exit_code"
                  exit $exit_code
                fi
              }

              if [ ! -s "$test_bins_file" ]; then
                echo "::error::No test binaries were produced for $crate ($package)"
                exit 1
              fi

              echo "Running prebuilt test binaries for $crate ($package) with timeout..."

              pushd "$crate" >/dev/null
              while IFS= read -r test_bin; do
                test_name=$(basename "$test_bin")
                echo "Testing $crate ($package): $test_name"

                timeout -k 10s 60s "$test_bin" || {
                  exit_code=$?
                  if [ $exit_code -eq 124 ] || [ $exit_code -eq 137 ]; then
                    if [ $exit_code -eq 137 ]; then
                      echo "::error::Test binary $test_name in $crate exceeded 60s timeout and was force-killed"
                    else
                      echo "::error::Test binary $test_name in $crate exceeded 60s timeout"
                    fi
                    popd >/dev/null
                    exit 1
                  else
                    echo "::error::Test binary $test_name in $crate failed with exit code $exit_code"
                    popd >/dev/null
                    exit $exit_code
                  fi
                }
              done < "$test_bins_file"
              popd >/dev/null
            fi
          done

          echo "✅ All tests completed within timeout"

      - name: Report summary
        if: always()
        run: |
          echo "## Test Policy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Minimum test counts verified" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All #[ignore] attributes documented" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No .rs.disabled files found" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test execution times within limits" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See test-inventory-report artifact for detailed breakdown" >> $GITHUB_STEP_SUMMARY

name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-bench-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-bench-${{ hashFiles('**/Cargo.lock') }}
    
    # Run benchmarks and save results
    - name: Run benchmarks
      run: |
        # Install cargo-criterion for better output formatting
        cargo install cargo-criterion --locked
        
        # Run benchmarks and save output
        mkdir -p bench-results
        
        # Run GLR parser benchmarks
        echo "Running GLR parser benchmarks..."
        cargo bench -p adze --bench glr_parser_bench -- --output-format bencher | tee bench-results/glr_parser_bench.txt || true
        
        # Run simple benchmarks
        echo "Running simple benchmarks..."
        cargo bench -p adze --bench simple_bench -- --output-format bencher | tee bench-results/simple_bench.txt || true
        
        # Run parser benchmarks
        echo "Running parser benchmarks..."
        cargo bench -p adze --bench parser_benchmark -- --output-format bencher | tee bench-results/parser_benchmark.txt || true
        
        # Combine all results
        echo "Combining benchmark results..."
        cat bench-results/*.txt > bench-results/all_benchmarks.txt
    
    # Compare with baseline for PRs
    - name: Download baseline benchmarks
      if: github.event_name == 'pull_request'
      uses: actions/cache@v4
      with:
        path: baseline-bench-results
        key: benchmark-baseline-${{ github.base_ref }}
        restore-keys: |
          benchmark-baseline-
    
    - name: Compare benchmarks
      if: github.event_name == 'pull_request'
      run: |
        # Create comparison script
        cat > compare_benchmarks.py << 'EOF'
        import sys
        import re
        import json
        
        def parse_benchmark_output(content):
            """Parse benchmark output in bencher format"""
            results = {}
            # Pattern: test bench_name ... bench:   123,456 ns/iter (+/- 12,345)
            pattern = r'test (\S+)\s+\.\.\.\s+bench:\s+([\d,]+)\s+ns/iter\s+\(\+/-\s+([\d,]+)\)'
            
            for match in re.finditer(pattern, content):
                name = match.group(1)
                time = int(match.group(2).replace(',', ''))
                variance = int(match.group(3).replace(',', ''))
                results[name] = {'time': time, 'variance': variance}
            
            return results
        
        def compare_results(baseline, current):
            """Compare benchmark results and generate report"""
            report = []
            report.append("## Benchmark Comparison\n")
            report.append("| Benchmark | Baseline | Current | Change | Status |")
            report.append("|-----------|----------|---------|---------|---------|")
            
            all_benchmarks = set(baseline.keys()) | set(current.keys())
            
            has_regression = False
            
            for bench_name in sorted(all_benchmarks):
                if bench_name in baseline and bench_name in current:
                    base_time = baseline[bench_name]['time']
                    curr_time = current[bench_name]['time']
                    change_pct = ((curr_time - base_time) / base_time) * 100
                    
                    # Format times
                    base_str = f"{base_time:,} ns"
                    curr_str = f"{curr_time:,} ns"
                    
                    # Determine status
                    if change_pct > 10:
                        status = "❌ Regression"
                        has_regression = True
                    elif change_pct < -10:
                        status = "✅ Improvement"
                    else:
                        status = "✓ No change"
                    
                    change_str = f"{change_pct:+.1f}%"
                    
                elif bench_name in current:
                    base_str = "N/A"
                    curr_str = f"{current[bench_name]['time']:,} ns"
                    change_str = "New"
                    status = "🆕 New"
                else:
                    base_str = f"{baseline[bench_name]['time']:,} ns"
                    curr_str = "N/A"
                    change_str = "Removed"
                    status = "🗑️ Removed"
                
                report.append(f"| {bench_name} | {base_str} | {curr_str} | {change_str} | {status} |")
            
            report.append("\n")
            
            if has_regression:
                report.append("⚠️ **Performance regressions detected!** Please review the changes above.")
            else:
                report.append("✅ **No performance regressions detected.**")
            
            return '\n'.join(report), has_regression
        
        # Main comparison logic
        try:
            # Read baseline results
            baseline_results = {}
            try:
                with open('baseline-bench-results/all_benchmarks.txt', 'r') as f:
                    baseline_results = parse_benchmark_output(f.read())
            except FileNotFoundError:
                print("No baseline results found. This might be the first run.")
                # Write empty report
                with open('benchmark-report.md', 'w') as f:
                    f.write("## Benchmark Results\n\nNo baseline results available. This appears to be the first run.\n")
                sys.exit(0)
            
            # Read current results
            with open('bench-results/all_benchmarks.txt', 'r') as f:
                current_results = parse_benchmark_output(f.read())
            
            # Generate comparison report
            report, has_regression = compare_results(baseline_results, current_results)
            
            # Write report to file
            with open('benchmark-report.md', 'w') as f:
                f.write(report)
            
            print(report)
            
            # Exit with error if regression detected
            if has_regression:
                sys.exit(1)
            
        except Exception as e:
            print(f"Error comparing benchmarks: {e}")
            sys.exit(1)
        EOF
        
        # Run comparison
        python3 compare_benchmarks.py || true
    
    # Post comment on PR with results
    - name: Post benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read the benchmark report
          let comment = '## Benchmark Results\n\n';
          
          try {
            const report = fs.readFileSync('benchmark-report.md', 'utf8');
            comment += report;
          } catch (e) {
            comment += 'No comparison available (this might be the first run).\n\n';
            
            // Just show current results
            try {
              const currentResults = fs.readFileSync('bench-results/all_benchmarks.txt', 'utf8');
              comment += '### Current Benchmark Results\n\n```\n' + currentResults + '\n```';
            } catch (e) {
              comment += 'Unable to read benchmark results.';
            }
          }
          
          // Find existing comment or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('## Benchmark Results')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }
    
    # Save baseline for main branch
    - name: Save baseline benchmarks
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p baseline-bench-results
        cp bench-results/* baseline-bench-results/
    
    - name: Upload baseline benchmarks
      if: github.ref == 'refs/heads/main'
      uses: actions/cache@v4
      with:
        path: baseline-bench-results
        key: benchmark-baseline-main-${{ github.sha }}
        restore-keys: |
          benchmark-baseline-main-
    
    # Upload artifacts for debugging
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: bench-results/
        retention-days: 30

  # Separate job for criterion HTML report generation
  criterion-report:
    name: Criterion HTML Report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Generate Criterion report
      run: |
        # Run benchmarks with HTML output
        cargo bench --workspace
        
        # The criterion HTML reports are in target/criterion
        if [ -d "target/criterion" ]; then
          echo "Criterion reports generated successfully"
        else
          echo "No criterion reports found"
          exit 1
        fi
    
    - name: Upload Criterion reports
      uses: actions/upload-artifact@v4
      with:
        name: criterion-reports
        path: target/criterion/
        retention-days: 30
    
    # Optional: Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./target/criterion
        destination_dir: benchmarks
        keep_files: true
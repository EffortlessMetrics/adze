name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body_path: RELEASE_NOTES.md
        draft: true
        prerelease: false

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Publish rust-sitter-ir
      run: |
        cd ir
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter-glr-core
      run: |
        cd glr-core
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter-tablegen
      run: |
        cd tablegen
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter-common
      run: |
        cd common
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter-macro
      run: |
        cd macro
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter
      run: |
        cd runtime
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true
    
    - name: Wait for crates.io to update
      run: sleep 30
    
    - name: Publish rust-sitter-tool
      run: |
        cd tool
        cargo publish --token ${{ secrets.CRATES_TOKEN }}
      continue-on-error: true

  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rust-sitter-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rust-sitter-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rust-sitter-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rust-sitter-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rust-sitter-windows-amd64.exe
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
    
    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --package rust-sitter-tool
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./target/${{ matrix.target }}/release/rust-sitter-tool${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}
        asset_name: ${{ matrix.artifact_name }}
        asset_content_type: application/octet-stream

  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Generate docs
      run: |
        cargo doc --workspace --no-deps --all-features
        echo '<meta http-equiv="refresh" content="0; url=rust_sitter/index.html">' > target/doc/index.html
    
    - name: Create docs archive
      run: |
        cd target/doc
        tar czf ../../rust-sitter-docs.tar.gz *
    
    - name: Upload docs
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./rust-sitter-docs.tar.gz
        asset_name: rust-sitter-docs.tar.gz
        asset_content_type: application/gzip
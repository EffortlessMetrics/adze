name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.current.outputs.version }}
      new_version: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Get current version
        id: current
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "adze") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      
      - name: Validate version bump
        run: |
          if ! cargo install cargo-semver-checks --locked; then
            echo "::warning::Could not install cargo-semver-checks"
          else
            # Check if this is a valid semver bump
            cargo semver-checks check-release --baseline-version ${{ steps.current.outputs.version }}
          fi
      
      - name: Check CHANGELOG.md
        run: |
          if ! grep -q "## \[${{ inputs.version }}\]" CHANGELOG.md; then
            echo "::error::Version ${{ inputs.version }} not found in CHANGELOG.md"
            exit 1
          fi

  test-suite:
    name: Full Test Suite
    needs: validate
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Run complete test suite
        run: |
          cargo test --workspace --all-features
          cargo test --workspace --no-default-features

  build-artifacts:
    name: Build Release Artifacts
    needs: test-suite
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a artifacts/adze-${{ inputs.version }}-${{ matrix.target }}.zip \
              target/${{ matrix.target }}/release/*.exe
          else
            tar czf artifacts/adze-${{ inputs.version }}-${{ matrix.target }}.tar.gz \
              -C target/${{ matrix.target }}/release .
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: artifacts/

  update-versions:
    name: Update Versions
    needs: validate
    runs-on: ubuntu-latest
    if: inputs.dry_run == false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-edit
        run: cargo install cargo-edit
      
      - name: Update workspace versions
        run: |
          # Update all workspace members to new version
          cargo set-version -p adze ${{ inputs.version }}
          cargo set-version -p adze-macro ${{ inputs.version }}
          cargo set-version -p adze-tool ${{ inputs.version }}
          cargo set-version -p adze-common ${{ inputs.version }}
          cargo set-version -p adze-ir ${{ inputs.version }}
          cargo set-version -p adze-glr-core ${{ inputs.version }}
          cargo set-version -p adze-tablegen ${{ inputs.version }}
          
          # Update internal dependencies
          cargo update -p adze -p adze-macro -p adze-tool
      
      - name: Commit version updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

  publish:
    name: Publish to crates.io
    needs: [test-suite, build-artifacts, update-versions]
    runs-on: ubuntu-latest
    if: inputs.dry_run == false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Use updated versions from previous job
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - name: Publish crates in dependency order
        run: |
          # Publish in dependency order
          cargo publish -p adze-common
          sleep 30  # Wait for crates.io to index
          
          cargo publish -p adze-ir
          sleep 30
          
          cargo publish -p adze-glr-core
          sleep 30
          
          cargo publish -p adze-tablegen
          sleep 30
          
          cargo publish -p adze
          sleep 30
          
          cargo publish -p adze-macro
          sleep 30
          
          cargo publish -p adze-tool

  create-release:
    name: Create GitHub Release
    needs: [publish, build-artifacts]
    runs-on: ubuntu-latest
    if: inputs.dry_run == false
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-artifacts
          path: artifacts/
      
      - name: Extract changelog
        id: changelog
        run: |
          # Extract the changelog for this version
          awk '/## \[${{ inputs.version }}\]/,/## \[/' CHANGELOG.md | head -n -1 > release_notes.md
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  announce:
    name: Post-Release Tasks
    needs: create-release
    runs-on: ubuntu-latest
    if: inputs.dry_run == false
    steps:
      - uses: actions/checkout@v4
      
      - name: Update documentation
        run: |
          echo "## Latest Release: v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Crates:" >> $GITHUB_STEP_SUMMARY
          echo "- adze: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- adze-macro: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- adze-tool: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
      
      - name: Trigger docs.rs build
        run: |
          # Trigger docs.rs to build the new version
          curl -X POST https://docs.rs/api/crate/adze/${{ inputs.version }}/build

  dry-run-summary:
    name: Dry Run Summary
    needs: [validate, test-suite, build-artifacts]
    runs-on: ubuntu-latest
    if: inputs.dry_run == true
    steps:
      - name: Summary
        run: |
          echo "## 🎯 Dry Run Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details:" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous: ${{ needs.validate.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Checks Passed:" >> $GITHUB_STEP_SUMMARY
          echo "- Version validation" >> $GITHUB_STEP_SUMMARY
          echo "- CHANGELOG entry found" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed on all platforms" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Would Publish:" >> $GITHUB_STEP_SUMMARY
          echo "1. adze-common" >> $GITHUB_STEP_SUMMARY
          echo "2. adze-ir" >> $GITHUB_STEP_SUMMARY
          echo "3. adze-glr-core" >> $GITHUB_STEP_SUMMARY
          echo "4. adze-tablegen" >> $GITHUB_STEP_SUMMARY
          echo "5. adze" >> $GITHUB_STEP_SUMMARY
          echo "6. adze-macro" >> $GITHUB_STEP_SUMMARY
          echo "7. adze-tool" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To perform actual release, run workflow again with dry_run=false**" >> $GITHUB_STEP_SUMMARY
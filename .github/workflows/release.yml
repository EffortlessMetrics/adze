name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      release_surface_mode:
        description: 'Release-surface mode (fixed uses scripts/release-crates.txt unless release_crate_file is set, auto computes publishable crates)'
        required: false
        default: fixed
        type: choice
        options:
          - fixed
          - auto
      release_crate_file:
        description: 'Optional release crate allowlist file path (defaults to scripts/release-crates.txt when unset)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: true
      publish_existing_versions:
        description: 'Publish the current versions from the selected release surface without bumping tags or versions'
        required: false
        type: boolean
        default: false
      strict_publish_surface:
        description: 'Fixed-mode only: fail release validation when publishable crates are missing from the allowlist'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.current.outputs.version }}
      new_version: ${{ inputs.version }}
      publish_order: ${{ steps.publish_order.outputs.publish_order }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable

      - name: Load publish crate order
        id: publish_order
        run: |
          if ! ORDER_JSON=$(RELEASE_SURFACE_MODE="${{ inputs.release_surface_mode }}" \
            RELEASE_CRATE_FILE="${{ inputs.release_crate_file }}" \
            ./scripts/release-surface.sh | jq -R -s -c 'split("\n") | map(select(length > 0))'); then
            echo "::error::Failed to resolve publish crate order"
            exit 1
          fi
          if [[ "$ORDER_JSON" == "[]" ]]; then
            echo "::error::No crates found in resolved release surface"
            exit 1
          fi
          echo "publish_order=$ORDER_JSON" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "adze") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Validate release surface
        run: |
          RELEASE_SURFACE_MODE="${{ inputs.release_surface_mode }}" \
          RELEASE_CRATE_FILE="${{ inputs.release_crate_file }}" \
          STRICT_PUBLISH_SURFACE="${{ inputs.strict_publish_surface }}" \
          ./scripts/validate-release-surface.sh

      - name: Validate version bump
        if: inputs.publish_existing_versions == false
        run: |
          mapfile -t PUBLISH_ORDER < <(jq -r '.[]' <<< '${{ steps.publish_order.outputs.publish_order }}')

          if ! cargo install cargo-semver-checks --locked; then
            echo "::error::Could not install cargo-semver-checks"
            exit 1
          fi

          METADATA_JSON="$(cargo metadata --no-deps --format-version 1)"

          # Check if this is a valid semver bump
          for crate in "${PUBLISH_ORDER[@]}"; do
            LOCAL_VERSION="$(printf '%s' "$METADATA_JSON" | jq -r --arg crate "$crate" '.packages[] | select(.name == $crate) | .version' | head -n1)"
            CRATE_INFO="$(curl -fsS "https://crates.io/api/v1/crates/$crate" | jq -r '.crate.max_stable_version // .crate.max_version // empty' || true)"

            if [[ -n "$CRATE_INFO" ]]; then
              BASELINE_VERSION="$CRATE_INFO"
            elif [[ -n "$LOCAL_VERSION" ]]; then
              BASELINE_VERSION="$LOCAL_VERSION"
              echo "::warning::Falling back to local version for semver check on ${crate}: $LOCAL_VERSION"
            else
              echo "::warning::Skipping semver check for ${crate}: no baseline version available from crates.io or local metadata"
              continue
            fi

            if ! cargo info "${crate}@${BASELINE_VERSION}" >/dev/null 2>&1; then
              echo "::warning::Skipping semver check for ${crate}: baseline version ${BASELINE_VERSION} not found on crates.io"
              continue
            fi

            cargo semver-checks check-release --baseline-version "$BASELINE_VERSION" --package "$crate"
          done

      - name: Check CHANGELOG.md
        if: inputs.publish_existing_versions == false
        run: |
          if ! grep -Fq "## [${{ inputs.version }}]" CHANGELOG.md; then
            echo "::error::Version ${{ inputs.version }} not found in CHANGELOG.md"
            exit 1
          fi

  test-suite:
    name: Full Test Suite
    needs: validate
    if: inputs.publish_existing_versions == false
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Run complete test suite
        run: |
          cargo test --workspace --all-features
          cargo test --workspace --no-default-features

  build-artifacts:
    name: Build Release Artifacts
    needs: test-suite
    if: inputs.publish_existing_versions == false
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a artifacts/adze-${{ inputs.version }}-${{ matrix.target }}.zip \
              target/${{ matrix.target }}/release/*.exe
          else
            tar czf artifacts/adze-${{ inputs.version }}-${{ matrix.target }}.tar.gz \
              -C target/${{ matrix.target }}/release .
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-artifacts-${{ matrix.target }}
          path: artifacts/

  update-versions:
    name: Update Versions
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_tag.outputs.tag }}
    if: inputs.dry_run == false && inputs.publish_existing_versions == false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-edit
        run: cargo install cargo-edit
      
      - name: Update workspace versions
        shell: bash
        run: |
          mapfile -t CRATES_TO_PUBLISH < <(jq -r '.[]' <<< '${{ needs.validate.outputs.publish_order }}')
          if [[ ${#CRATES_TO_PUBLISH[@]} -eq 0 ]]; then
            echo "::error::No crates found in resolved release surface"
            exit 1
          fi

          for crate in "${CRATES_TO_PUBLISH[@]}"; do
            cargo set-version -p "$crate" "${{ inputs.version }}"
          done

          UPDATE_ARGS=()
          for crate in "${CRATES_TO_PUBLISH[@]}"; do
            UPDATE_ARGS+=("-p" "$crate")
          done
          cargo update "${UPDATE_ARGS[@]}"
      
      - name: Commit version updates
        run: |
          if git diff --quiet; then
            echo "No version updates were needed for ${{ inputs.version }}"
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Create release tag
        id: create_tag
        run: |
          TAG="v${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to crates.io
    needs: [test-suite, build-artifacts, update-versions, validate]
    runs-on: ubuntu-latest
    if: inputs.dry_run == false && inputs.publish_existing_versions == false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.update-versions.outputs.release_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - name: Publish crates in dependency order
        run: |
          mapfile -t PUBLISH_ORDER < <(jq -r '.[]' <<< '${{ needs.validate.outputs.publish_order }}')

          for crate in "${PUBLISH_ORDER[@]}"; do
            cargo publish -p "$crate"
            sleep 30  # Wait for crates.io to index
          done

  create-release:
    name: Create GitHub Release
    needs: [publish, build-artifacts, update-versions]
    runs-on: ubuntu-latest
    if: inputs.dry_run == false && inputs.publish_existing_versions == false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.update-versions.outputs.release_tag }}
      
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: artifacts/
      
      - name: Extract changelog
        id: changelog
        run: |
          TARGET="## [${{ inputs.version }}]"
          awk -v target="$TARGET" '
            $0 == target { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "::error::Failed to extract notes for version ${{ inputs.version }}"
            exit 1
          fi
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.update-versions.outputs.release_tag }}
          name: ${{ needs.update-versions.outputs.release_tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  announce:
    name: Post-Release Tasks
    needs: [create-release, validate]
    runs-on: ubuntu-latest
    if: inputs.dry_run == false && inputs.publish_existing_versions == false
    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Update documentation
        run: |
          echo "## Latest Release: v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Crates:" >> $GITHUB_STEP_SUMMARY
          mapfile -t PUBLISH_ORDER < <(jq -r '.[]' <<< '${{ needs.validate.outputs.publish_order }}')
          for crate in "${PUBLISH_ORDER[@]}"; do
            echo "- ${crate}: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          done
      
      - name: Trigger docs.rs build
        run: |
          # Trigger docs.rs to build the new version
          for attempt in 1 2 3; do
            if curl -fsS -X POST https://docs.rs/api/crate/adze/${{ inputs.version }}/build; then
              break
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "::error::Failed to trigger docs.rs build for v${{ inputs.version }}"
              exit 1
            fi

            echo "Retrying docs.rs trigger (attempt $attempt)"
            sleep 3
          done

  dry-run-summary:
    name: Dry Run Summary
    needs: [validate, test-suite, build-artifacts]
    runs-on: ubuntu-latest
    if: inputs.dry_run == true && inputs.publish_existing_versions == false
    steps:
      - name: Summary
        run: |
          echo "## 🎯 Dry Run Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details:" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous: ${{ needs.validate.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Release surface mode: ${{ inputs.release_surface_mode }}" >> $GITHUB_STEP_SUMMARY
          release_crate_file="${{ inputs.release_crate_file }}"
          if [[ -z "$release_crate_file" ]]; then
            release_crate_file="scripts/release-crates.txt"
          fi
          echo "- Release crate file: $release_crate_file" >> $GITHUB_STEP_SUMMARY
          echo "- Strict publish surface: ${{ inputs.strict_publish_surface }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Checks Passed:" >> $GITHUB_STEP_SUMMARY
          echo "- Version validation" >> $GITHUB_STEP_SUMMARY
          echo "- CHANGELOG entry found" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed on all platforms" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Would Publish:" >> $GITHUB_STEP_SUMMARY
          mapfile -t PUBLISH_ORDER < <(jq -r '.[]' <<< '${{ needs.validate.outputs.publish_order }}')
          i=1
          for crate in "${PUBLISH_ORDER[@]}"; do
            echo "${i}. ${crate}" >> $GITHUB_STEP_SUMMARY
            i=$((i+1))
          done
          echo "**To perform actual release, run workflow again with dry_run=false**" >> $GITHUB_STEP_SUMMARY

  publish-existing-surface:
    name: Publish Existing Surface
    needs: validate
    runs-on: ubuntu-latest
    if: inputs.dry_run == false && inputs.publish_existing_versions == true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate release surface
        run: |
          RELEASE_SURFACE_MODE="${{ inputs.release_surface_mode }}" \
          RELEASE_CRATE_FILE="${{ inputs.release_crate_file }}" \
          STRICT_PUBLISH_SURFACE="${{ inputs.strict_publish_surface }}" \
          ./scripts/validate-release-surface.sh

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish current crate versions in dependency order
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PUBLISH_ORDER < <(jq -r '.[]' <<< '${{ needs.validate.outputs.publish_order }}')
          if [[ ${#PUBLISH_ORDER[@]} -eq 0 ]]; then
            echo "::error::No crates found in resolved release surface"
            exit 1
          fi

          METADATA_JSON="$(cargo metadata --no-deps --format-version 1)"
          PROBE_DIR="$(mktemp -d)"
          trap 'rm -rf "$PROBE_DIR"' EXIT

          crate_version() {
            local crate="$1"
            jq -r --arg crate "$crate" '.packages[] | select(.name == $crate) | .version' <<<"$METADATA_JSON"
          }

          is_published() {
            local crate="$1"
            local version="$2"
            (
              cd "$PROBE_DIR"
              cargo info "${crate}@${version}" >/dev/null 2>&1
            )
          }

          wait_for_index() {
            local crate="$1"
            local version="$2"
            for attempt in {1..20}; do
              if is_published "$crate" "$version"; then
                return 0
              fi
              echo "Waiting for ${crate}@${version} to appear in the cargo index (attempt ${attempt}/20)"
              sleep 15
            done
            echo "::error::Timed out waiting for ${crate}@${version} to appear in the cargo index"
            return 1
          }

          rate_limit_sleep_seconds() {
            local log_file="$1"
            python3 - "$log_file" <<'PY'
import email.utils
import pathlib
import re
import sys
import time

text = pathlib.Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
matches = re.findall(r"Please try again after (.+? GMT)", text)
if not matches:
    raise SystemExit(1)

retry_at = email.utils.parsedate_to_datetime(matches[-1])
delay = int(max(0, retry_at.timestamp() - time.time() + 5))
print(delay)
PY
          }

          for crate in "${PUBLISH_ORDER[@]}"; do
            version="$(crate_version "$crate")"
            if [[ -z "$version" || "$version" == "null" ]]; then
              echo "::error::Unable to resolve local version for ${crate}"
              exit 1
            fi

            echo "::group::${crate}@${version}"

            if is_published "$crate" "$version"; then
              echo "${crate}@${version} is already published; skipping"
              echo "::endgroup::"
              continue
            fi

            published=0
            for attempt in {1..20}; do
              log_file="$(mktemp)"
              if cargo publish --locked --no-verify -p "$crate" >"$log_file" 2>&1; then
                cat "$log_file"
                rm -f "$log_file"
                published=1
                break
              fi
              cat "$log_file"

              if is_published "$crate" "$version"; then
                echo "${crate}@${version} appears to have published despite cargo returning non-zero"
                rm -f "$log_file"
                published=1
                break
              fi

              if sleep_for="$(rate_limit_sleep_seconds "$log_file" 2>/dev/null)"; then
                rm -f "$log_file"
                if (( sleep_for > 0 )); then
                  echo "Publish rate-limited for ${crate}@${version}; sleeping ${sleep_for}s before retry"
                  sleep "$sleep_for"
                fi
                continue
              fi

              rm -f "$log_file"
              echo "Publish attempt ${attempt}/20 failed for ${crate}@${version}; retrying in 30s"
              sleep 30
            done

            if [[ "$published" -ne 1 ]]; then
              echo "::error::Failed to publish ${crate}@${version}"
              exit 1
            fi

            wait_for_index "$crate" "$version"
            echo "::endgroup::"
          done

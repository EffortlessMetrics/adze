# Secret Detection Workflow
# Part of Policy-as-Code (AC-P3: Security Policies)
# Scans for accidentally committed secrets and sensitive data
#
# Detection methods:
#   1. Pattern matching (API keys, tokens, passwords)
#   2. High entropy strings (potential secrets)
#   3. File path analysis (credentials, certificates)
#   4. Commit message scanning
#
# Runs on:
#   - All pull requests
#   - Pushes to main/master
#   - Manual trigger

name: Secret Detection

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs when new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Secret Scanning with TruffleHog
  # ==========================================================================
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan entire git history
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ==========================================================================
  # Pattern-Based Secret Detection
  # ==========================================================================
  pattern-scan:
    name: Pattern-Based Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for common secret patterns
        run: |
          echo "🔍 Scanning for secret patterns..."

          # Define patterns to search for
          PATTERNS=(
            "api[_-]?key"
            "apikey"
            "api_key"
            "access[_-]?token"
            "auth[_-]?token"
            "secret[_-]?key"
            "private[_-]?key"
            "password"
            "passwd"
            "pwd"
            "bearer[[:space:]]"
            "AKIA[0-9A-Z]{16}"  # AWS Access Key
            "sk_live_[0-9a-zA-Z]{24}"  # Stripe Secret Key
            "pk_live_[0-9a-zA-Z]{24}"  # Stripe Public Key
            "ghp_[0-9a-zA-Z]{36}"  # GitHub Personal Access Token
            "gho_[0-9a-zA-Z]{36}"  # GitHub OAuth Token
            "-----BEGIN[[:space:]].*PRIVATE[[:space:]]KEY-----"  # Private keys
          )

          FOUND=0

          # Search for patterns (case-insensitive, excluding .git directory)
          for pattern in "${PATTERNS[@]}"; do
            echo "  Checking pattern: $pattern"
            if grep -riE --exclude-dir=.git --exclude-dir=target --exclude-dir=node_modules "$pattern" . 2>/dev/null; then
              echo "❌ Found potential secret matching pattern: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✅ No secret patterns detected"
          else
            echo ""
            echo "❌ Potential secrets detected!"
            echo "Review the matches above carefully."
            echo "If these are false positives, add them to .secretsignore"
            exit 1
          fi

  # ==========================================================================
  # High Entropy String Detection
  # ==========================================================================
  entropy-scan:
    name: High Entropy String Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for high entropy strings
        run: |
          python3 << 'EOF'
          import os
          import re
          import math
          from pathlib import Path

          def calculate_entropy(string):
              """Calculate Shannon entropy of a string"""
              if not string:
                  return 0
              entropy = 0
              for x in range(256):
                  p_x = float(string.count(chr(x))) / len(string)
                  if p_x > 0:
                      entropy += - p_x * math.log2(p_x)
              return entropy

          def scan_file(filepath):
              """Scan file for high entropy strings"""
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()

                  # Extract potential secrets (base64-like strings, hex strings)
                  patterns = [
                      r'[a-zA-Z0-9+/]{40,}={0,2}',  # Base64
                      r'[a-fA-F0-9]{32,}',  # Hex
                  ]

                  findings = []
                  for pattern in patterns:
                      matches = re.findall(pattern, content)
                      for match in matches:
                          entropy = calculate_entropy(match)
                          if entropy > 4.5 and len(match) > 20:  # High entropy threshold
                              findings.append((filepath, match[:40] + '...', entropy))

                  return findings
              except Exception as e:
                  return []

          # Scan all text files
          findings = []
          exclude_dirs = {'.git', 'target', 'node_modules', '.github'}
          exclude_exts = {'.png', '.jpg', '.jpeg', '.gif', '.ico', '.woff', '.woff2', '.ttf', '.eot'}

          for root, dirs, files in os.walk('.'):
              # Remove excluded directories
              dirs[:] = [d for d in dirs if d not in exclude_dirs]

              for file in files:
                  ext = Path(file).suffix.lower()
                  if ext not in exclude_exts:
                      filepath = os.path.join(root, file)
                      findings.extend(scan_file(filepath))

          if findings:
              print("⚠️  High entropy strings detected (potential secrets):")
              for filepath, snippet, entropy in findings[:10]:  # Limit output
                  print(f"  {filepath}: entropy={entropy:.2f} - {snippet}")
              print(f"\n{len(findings)} high entropy strings found.")
              print("Review these carefully - they may be encoded secrets.")
          else:
              print("✅ No suspicious high entropy strings detected")
          EOF

  # ==========================================================================
  # File Path Analysis
  # ==========================================================================
  file-analysis:
    name: Sensitive File Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          echo "🔍 Checking for sensitive file patterns..."

          # Sensitive file patterns
          PATTERNS=(
            "*.pem"
            "*.key"
            "*.p12"
            "*.pfx"
            "*.jks"
            "*.keystore"
            "*credentials*"
            "*secret*"
            ".env"
            ".env.*"
            "id_rsa"
            "id_dsa"
            "*.crt"
            "*.der"
            "*.cer"
          )

          FOUND=0

          for pattern in "${PATTERNS[@]}"; do
            files=$(find . -type f -name "$pattern" ! -path "./.git/*" ! -path "./target/*" 2>/dev/null)
            if [ -n "$files" ]; then
              echo "⚠️  Found files matching pattern: $pattern"
              echo "$files"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✅ No sensitive file patterns detected"
          else
            echo ""
            echo "⚠️  Sensitive files detected!"
            echo "Ensure these files:"
            echo "  1. Are added to .gitignore"
            echo "  2. Don't contain real secrets"
            echo "  3. Are necessary for the project"
          fi

  # ==========================================================================
  # Secret Detection Summary
  # ==========================================================================
  secrets-summary:
    name: Secret Detection Summary
    runs-on: ubuntu-latest
    needs: [trufflehog, pattern-scan, entropy-scan, file-analysis]
    if: always()

    steps:
      - name: Check all scans passed
        run: |
          if [ "${{ needs.trufflehog.result }}" != "success" ] || \
             [ "${{ needs.pattern-scan.result }}" != "success" ] || \
             [ "${{ needs.entropy-scan.result }}" != "success" ] || \
             [ "${{ needs.file-analysis.result }}" != "success" ]; then
            echo "❌ Secret Detection Failed"
            echo ""
            echo "TruffleHog: ${{ needs.trufflehog.result }}"
            echo "Pattern Scan: ${{ needs.pattern-scan.result }}"
            echo "Entropy Scan: ${{ needs.entropy-scan.result }}"
            echo "File Analysis: ${{ needs.file-analysis.result }}"
            echo ""
            echo "Review the failed scans above and remove any secrets."
            exit 1
          else
            echo "✅ All secret detection scans passed"
            echo ""
            echo "TruffleHog: ✅"
            echo "Pattern Scan: ✅"
            echo "Entropy Scan: ✅"
            echo "File Analysis: ✅"
          fi

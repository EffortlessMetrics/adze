name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --workspace --all-features
        
      - name: Run tests
        run: cargo test --workspace --all-features
        
      - name: Run doctests
        run: cargo test -p rust-sitter --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy
          
      - name: Run clippy
        run: |
          # Exclude vendored/generated code if in separate crate
          cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt
          
      - name: Check formatting
        run: cargo fmt --all -- --check

  loc-tracking:
    name: LOC Tracking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install tokei
        run: |
          wget https://github.com/XAMPPRocky/tokei/releases/latest/download/tokei-x86_64-unknown-linux-gnu.tar.gz
          tar xf tokei-x86_64-unknown-linux-gnu.tar.gz
          chmod +x tokei
          
      - name: Count LOC
        run: |
          # Count only authored Rust code, excluding vendored/generated
          ./tokei --exclude '**/vendor/**' --exclude '**/generated/**' --exclude '**/target/**' --type Rust
          
      - name: Store LOC metrics
        run: |
          ./tokei --exclude '**/vendor/**' --exclude '**/generated/**' --exclude '**/target/**' --type Rust --output json > loc-metrics.json
          
      - name: Upload LOC metrics
        uses: actions/upload-artifact@v3
        with:
          name: loc-metrics
          path: loc-metrics.json

  # Performance benchmark job - runs on main branch only
  perf-bench:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          
      - name: Run benchmarks
        run: |
          cargo bench --bench incremental -- --output-format bencher | tee bench-output.txt
          
      - name: Store benchmark results
        run: |
          mkdir -p bench-results
          cp bench-output.txt bench-results/
          echo "Commit: ${{ github.sha }}" >> bench-results/metadata.txt
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> bench-results/metadata.txt
          
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench-results/

  # Nightly performance regression check
  perf-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          
      - name: Download baseline
        uses: actions/download-artifact@v3
        with:
          name: baseline-benchmark
          path: baseline/
        continue-on-error: true
        
      - name: Run benchmarks
        run: cargo bench --bench incremental -- --output-format bencher | tee current-bench.txt
        
      - name: Check for regression
        run: |
          if [ -f baseline/bench-output.txt ]; then
            # Parse and compare benchmark results
            # Alert if performance regressed by more than 10%
            python3 -c "
          import re
          
          def parse_bench(file):
              with open(file) as f:
                  text = f.read()
                  # Extract ns/iter values
                  matches = re.findall(r'test (\S+)\s+\.\.\.\s+bench:\s+([0-9,]+)\s+ns/iter', text)
                  return {name: int(time.replace(',', '')) for name, time in matches}
          
          baseline = parse_bench('baseline/bench-output.txt')
          current = parse_bench('current-bench.txt')
          
          regressions = []
          for test in baseline:
              if test in current:
                  ratio = current[test] / baseline[test]
                  if ratio > 1.10:  # 10% regression threshold
                      regressions.append(f'{test}: {ratio:.2f}x slower')
          
          if regressions:
              print('Performance regressions detected:')
              for r in regressions:
                  print(f'  - {r}')
              exit(1)
          else:
              print('No performance regressions detected')
            "
          fi
          
      - name: Update baseline
        if: success() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p new-baseline
          cp current-bench.txt new-baseline/bench-output.txt
          
      - name: Upload new baseline
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: baseline-benchmark
          path: new-baseline/
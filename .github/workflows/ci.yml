name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run nightly at 2 AM UTC for scheduled jobs (fuzzing, etc)
    - cron: '0 2 * * *'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  COVERAGE_THRESHOLD: 80
  # Cap Concurrency - stabilize tests across CI environments (Balanced for stable testing)
  RUST_TEST_THREADS: 2
  RAYON_NUM_THREADS: 4
  TOKIO_WORKER_THREADS: 2
  TOKIO_BLOCKING_THREADS: 8
  CARGO_BUILD_JOBS: 4
  OMP_NUM_THREADS: 1
  OPENBLAS_NUM_THREADS: 1
  MKL_NUM_THREADS: 1
  NUMEXPR_NUM_THREADS: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
      
      - name: Check for bare #[no_mangle]
        run: scripts/check-no-mangle.sh
      
      - name: Check commented debug blocks
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, only check files changed in the diff
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            python3 tools/check_debug_blocks.py --since "origin/${{ github.base_ref }}"
          else
            # For push to main, check all tracked files
            python3 tools/check_debug_blocks.py
          fi
      
      - name: Validator self-test
        run: python3 tools/test_debug_blocks.py
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy (default features, per-package)
        run: scripts/clippy-per-package.sh default
        
      - name: Clippy (tree-sitter-c2rust, per-package)
        run: scripts/clippy-per-package.sh c2rust
      
      - name: Clippy - collect per-package outputs
        shell: bash
        continue-on-error: true
        run: |
          chmod +x ./scripts/clippy-collect.sh
          ./scripts/clippy-collect.sh || true
      
      - name: Upload Clippy reports
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report
          path: clippy-report

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.features }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features:
          - ""  # default features
          - "--no-default-features --features tree-sitter-c2rust"
          - "--features external_scanners"
          - "--features incremental_glr"
        toolchain: [stable, beta]
        exclude:
          # Reduce CI load: only test beta on ubuntu with default features
          - os: macos-latest
            toolchain: beta
          - os: windows-latest
            toolchain: beta
          - features: "--no-default-features --features tree-sitter-c2rust"
            toolchain: beta
          - features: "--features external_scanners"
            toolchain: beta
          - features: "--features incremental_glr"
            toolchain: beta
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for disabled test files
        run: |
          if git ls-files '*.disabled' | grep -q .; then
            echo "❌ Found .disabled files in repo:"
            git ls-files '*.disabled'
            echo ""
            echo "Please either:"
            echo "  1. Re-enable these tests by removing .disabled suffix"
            echo "  2. Mark tests with #[ignore] attribute instead"
            echo "  3. Remove obsolete test files"
            exit 1
          fi
      
      - uses: dtolnay/rust-toolchain@${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      
      - name: Run tests with nextest
        run: cargo nextest run --workspace ${{ matrix.features }}
      
      - name: Run doctests
        run: cargo test --doc --workspace ${{ matrix.features }}
      
      - name: Tablegen rustdoc (strict, all features)
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings
        run: cargo doc -p adze-tablegen --all-features --no-deps --features strict_docs
      
      - name: Tablegen doctests (strict)
        run: cargo test -p adze-tablegen --doc --features strict_docs
      
      - name: Clippy (tablegen only, warnings as errors)
        run: cargo clippy -p adze-tablegen -- -D warnings
      
      - name: Example (pure-rust) tests
        run: cargo test -p adze-example --features pure-rust -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test tablegen (small-table)
        run: cargo test -p adze-tablegen --features "small-table" -- --test-threads=$RUST_TEST_THREADS --nocapture
      
      - name: Compile pure-rust golden tests (no-run)
        run: cargo test -p adze --test golden_tests --features pure-rust --no-run

  # Matrix smoke test to prevent feature drift
  matrix-smoke:
    name: Matrix Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Tree-sitter development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libtree-sitter-dev pkg-config
      
      - name: Test (workspace, default features)
        run: cargo test --workspace --locked --no-fail-fast -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test (workspace, all features)
        run: cargo test --workspace --all-features --locked --no-fail-fast -- --test-threads=$RUST_TEST_THREADS

  # Test with debug assertions enabled to catch invariant violations
  test-debug-assertions:
    name: Test with Debug Assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Test glr-core with debug assertions
        env:
          RUSTFLAGS: '-C debug-assertions'
        run: |
          cargo test -p adze-glr-core --lib -- --test-threads=$RUST_TEST_THREADS
          cargo test -p adze-glr-core --tests -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test runtime with debug assertions
        env:
          RUSTFLAGS: '-C debug-assertions'
        run: cargo test -p adze --lib -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test tablegen with debug assertions
        env:
          RUSTFLAGS: '-C debug-assertions'
        run: cargo test -p adze-tablegen --lib -- --test-threads=$RUST_TEST_THREADS

  test-release:
    name: Test Release Mode (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""  # default features
          - "--features strict-invariants"
          - "--no-default-features --features tree-sitter-c2rust"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests in release mode
        run: cargo test --workspace --release ${{ matrix.features }} -- --test-threads=$RUST_TEST_THREADS
      
      - name: Run invariant tests with strict-invariants
        if: contains(matrix.features, 'strict-invariants')
        run: |
          cargo test -p adze-glr-core --release --features strict-invariants,test-helpers -- --test-threads=$RUST_TEST_THREADS
          cargo test -p adze-glr-core --release --test test_eof_fix --features strict-invariants -- --test-threads=$RUST_TEST_THREADS
          cargo test -p adze-glr-core --release --test test_eof_column_parity --features strict-invariants -- --test-threads=$RUST_TEST_THREADS
          cargo test -p adze-glr-core --release --test test_accept_via_insertion --features strict-invariants -- --test-threads=$RUST_TEST_THREADS

  benchmarks:
    name: Benchmark Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Check glr-core benchmarks compile
        run: cargo bench -p adze-glr-core --bench automaton --no-run
      
      - name: Check tablegen benchmarks compile
        run: cargo bench -p adze-tablegen --bench compression --no-run
      
      - name: Check incremental benchmarks compile
        run: cargo bench -p adze-benchmarks --bench incremental_bench --no-run

  backend-matrix:
    name: Backend Build Matrix (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: pure-rust
            flags: ""
          - name: c-backend
            flags: "--no-default-features --features c-backend"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install tree-sitter CLI (for C backend)
        if: matrix.backend.name == 'c-backend'
        run: |
          npm install -g tree-sitter-cli@^0.22
          tree-sitter --version
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Check workspace compilation
        run: cargo check --workspace ${{ matrix.backend.flags }}
      
      - name: Run clippy on runtime with ${{ matrix.backend.name }}
        run: cargo clippy -p adze ${{ matrix.backend.flags }} -- -D warnings
      
      - name: Run clippy on example with ${{ matrix.backend.name }}
        run: cargo clippy -p adze-example ${{ matrix.backend.flags }} -- -D warnings
      
      - name: Build example with ${{ matrix.backend.name }}
        run: cargo build -p adze-example ${{ matrix.backend.flags }}
      
      - name: Test runtime with ${{ matrix.backend.name }}
        run: cargo test -p adze ${{ matrix.backend.flags }} -- --test-threads=$RUST_TEST_THREADS

  miri:
    name: Miri (UB Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      
      - name: Setup Miri
        run: cargo miri setup
      
      - name: Run Miri tests
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-symbolic-alignment-check"
        run: |
          cargo miri test -p adze --lib
          cargo miri test -p adze-glr-core --lib
          cargo miri test -p adze-tablegen --lib
      
      - name: Run Miri on external scanner tests
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
        run: |
          cargo miri test -p adze --features external_scanners external_scanner_ || true

  ts-compat:
    name: Tree-sitter Compatibility API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build with ts-compat feature
        run: |
          cargo build -p adze --features "ts-compat pure-rust"
          cargo build -p adze-example --features "ts-compat pure-rust"
      
      - name: Test ts-compat API
        run: cargo test -p adze --features "ts-compat pure-rust" --test ts_compat_equiv -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test ts-compat golden tests
        run: cargo test -p adze --test golden_tests --features ts-compat -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test ts-compat with incremental GLR
        run: cargo test -p adze --features "ts-compat pure-rust incremental_glr" --test ts_compat_equiv -- --test-threads=$RUST_TEST_THREADS

  sanitizers:
    name: Sanitizers (ASAN/UBSAN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      
      - name: Run with Address Sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          RUSTDOCFLAGS: "-Zsanitizer=address"
        run: |
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p adze --lib --tests
      
      - name: Run with Undefined Behavior Sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=undefined"
          RUSTDOCFLAGS: "-Zsanitizer=undefined"
        run: |
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p adze --lib --tests

  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      
      - name: Update to minimal versions
        run: cargo update -Z minimal-versions
      
      - name: Build with minimal versions
        run: cargo build --workspace --all-features -Z minimal-versions

  semver-checks:
    name: API Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      
      - name: Check for breaking changes in adze
        run: |
          cargo semver-checks check-release \
            -p adze \
            --baseline-rev v0.8.0-dev.api-freeze-1
      
      - name: Check for breaking changes in macro
        run: |
          cargo semver-checks check-release \
            -p adze-macro \
            --baseline-rev v0.8.0-dev.api-freeze-1
      
      - name: Check for breaking changes in tool
        run: |
          cargo semver-checks check-release \
            -p adze-tool \
            --baseline-rev v0.8.0-dev.api-freeze-1
      
      - name: Public API diff (heads-up only)
        continue-on-error: true
        run: |
          cargo install cargo-public-api || true
          cargo public-api -p adze > public-api.new.txt
          git show v0.8.0-dev.api-freeze-1:public-api.txt > public-api.old.txt || echo "No baseline API file yet" > public-api.old.txt
          diff -u public-api.old.txt public-api.new.txt > api-diff.txt || true
          echo "API Diff Summary:" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat api-diff.txt >> $GITHUB_STEP_SUMMARY || echo "No changes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload API diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-api-diff
          path: |
            public-api.old.txt
            public-api.new.txt
            api-diff.txt

  deterministic-codegen:
    name: Deterministic Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Check codegen determinism
        run: |
          # Build twice and compare outputs
          cargo build -p adze-example --release
          cp -r target/release target/release1
          cargo clean
          cargo build -p adze-example --release
          
          # Compare generated artifacts
          if ! diff -r target/release1 target/release > /dev/null 2>&1; then
            echo "::error::Non-deterministic build detected!"
            exit 1
          fi

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      
      - name: Test feature powerset (adze)
        run: |
          cargo hack test -p adze --feature-powerset \
            --exclude-features default \
            --skip tree-sitter-standard \
            --lib --tests
      
      - name: Test incremental_glr feature
        run: cargo test --workspace --features incremental_glr -- --test-threads=$RUST_TEST_THREADS
      
      - name: Test experimental examples (opt-in)
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[test-examples]') }}
        run: cargo test -p adze --examples --features experimental_examples -- --test-threads=$RUST_TEST_THREADS

  msrv:
    name: MSRV (1.89.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      
      - name: Build on MSRV
        run: cargo build --workspace --all-features

  api-stability:
    name: API Stability
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install API tools
        run: |
          cargo install cargo-public-api --locked
          cargo install cargo-semver-checks --locked
      
      - name: Public API diff (adze)
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }}
          cargo public-api --diff-git-checks origin/${{ github.base_ref }}...HEAD \
            -p adze --deny-changes
      
      - name: SemVer checks (public crates)
        continue-on-error: true
        run: |
          cargo semver-checks check-release -p adze || true
          cargo semver-checks check-release -p adze-ir || true
          cargo semver-checks check-release -p adze-glr-core || true

  security:
    name: Security & Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      
      - name: Check advisories, licenses, and bans
        run: cargo deny check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Tree-sitter development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libtree-sitter-dev pkg-config
      
      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

  # Dedicated adze-python job to prevent timeouts
  adze-python:
    name: adze-python (Optimized Build)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: 2              # cap parallelism to reduce fork pressure
      CARGO_INCREMENTAL: "1"           # incremental to speed rebuilds
      RUSTFLAGS: "-C debuginfo=0 -C codegen-units=8"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            grammars/python -> target
      - name: Build adze-python
        run: cargo build -p adze-python --locked --jobs 2
      - name: Compile tests (no run)
        run: cargo test -p adze-python --locked --no-run --jobs 2
      - name: Run tests
        run: cargo test -p adze-python -- --test-threads 1 --nocapture
      - name: Capture cargo timings
        run: cargo build -p adze-python --timings && ls -R target/cargo-timings || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
            name: cargo-timings-python
            path: target/cargo-timings

  cross-compile:
    name: Cross Compilation (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu      # 32-bit x86
          - aarch64-unknown-linux-gnu   # ARM64
          - wasm32-unknown-unknown      # WebAssembly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cross-compilation tools
        if: matrix.target != 'wasm32-unknown-unknown'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi
      
      - name: Build for ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "wasm32-unknown-unknown" ]; then
            cargo build --target ${{ matrix.target }} --package adze --no-default-features
          else
            cargo build --target ${{ matrix.target }} --package adze
          fi
      
      - name: Check ChildEdge size on 32-bit
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          # Ensure ChildEdge maintains expected size on 32-bit platforms
          cargo test --target ${{ matrix.target }} --package adze --lib -- --test-threads=$RUST_TEST_THREADS --nocapture child_edge_size || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Tree-sitter development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libtree-sitter-dev pkg-config
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --all-features --print-summary | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
            exit 1
          fi
      
      - name: Upload to codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v3
        with:
          files: lcov.info
          fail_ci_if_error: false
      
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('lcov.info', 'utf8');
            // Parse and format coverage report
            const body = `## Coverage Report\n\n${coverage.substring(0, 500)}...`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  unsafe-audit:
    name: Unsafe Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      
      - name: Audit unsafe code usage
        run: |
          echo "## Unsafe Code Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo geiger --workspace >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      
      - name: Fuzz lexer (20k iterations)
        run: |
          cd fuzz
          cargo fuzz run fuzz_lexer -- -runs=20000 -max_len=1024
      
      - name: Fuzz parser (20k iterations)
        run: |
          cd fuzz
          cargo fuzz run fuzz_parser -- -runs=20000 -max_len=2048
      
      - name: Fuzz external scanner (10k iterations)
        run: |
          cd fuzz
          cargo fuzz run fuzz_external_scanner -- -runs=10000 -max_len=512
      
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/

  test-connectivity:
    name: Test Connectivity (Tripwires)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["", "--features external_scanners", "--features incremental_glr", "--no-default-features --features tree-sitter-c2rust"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libtree-sitter-dev pkg-config

      # 1) Block silently disabled tests (files renamed to .disabled)
      - name: Fail on disabled test files
        run: |
          if git ls-files '*tests/*.rs.disabled' | grep -q .; then
            echo "::error::Found disabled test files (*.rs.disabled):"
            git ls-files '*tests/*.rs.disabled'
            exit 1
          fi

      # 2) List discovered tests for the current feature set
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: List discovered tests (${{ matrix.features || 'default-features' }})
        run: |
          set -e
          cargo nextest list --workspace ${{ matrix.features }} > .nextest-list.txt
          echo "### Discovered tests for feature set: ${{ matrix.features || 'default' }}"
          head -200 .nextest-list.txt || true
          COUNT=$(grep -E '^\s+(test|bench|example)' .nextest-list.txt | wc -l | tr -d ' ')
          echo "TOTAL_DISCOVERED_TESTS=$COUNT" >> $GITHUB_ENV
          echo "Total discovered: $COUNT tests"

      # 3) Fail if discovery unexpectedly returns zero tests
      - name: Enforce nonzero discovery
        run: |
          if [ "${{ env.TOTAL_DISCOVERED_TESTS }}" -eq 0 ]; then
            echo "::error::No tests discovered with feature set: '${{ matrix.features }}'"
            echo "This indicates a test harness disconnection or build issue."
            exit 1
          fi
          echo "✓ Found ${{ env.TOTAL_DISCOVERED_TESTS }} tests"

      # 4) Surface ignored/filtered tests (useful signal, non-fatal)
      - name: Surface #[ignore] tests
        run: |
          echo "### Checking for ignored tests..."
          IGNORED=$(rg -n --hidden --glob '!target' '^\s*#\s*\[\s*ignore' || echo "None found")
          if [ "$IGNORED" != "None found" ]; then
            echo "Found ignored tests (non-fatal):"
            echo "$IGNORED"
          else
            echo "✓ No ignored tests found"
          fi

      # 5) Per-crate discovery counts for quick diffing in PRs
      - name: Per-crate discovery counts
        run: |
          echo "### Per-crate test discovery:"
          echo '```'
          cargo metadata --no-deps --format-version=1 | jq -r '.packages[].name' \
          | while read CRATE; do
              COUNT=$(cargo nextest list -p "$CRATE" ${{ matrix.features }} 2>/dev/null | grep -E '^\s+(test|bench)' | wc -l | tr -d ' ')
              printf "%-35s %6d tests\n" "$CRATE" "$COUNT"
            done | sort -k2 -nr
          echo '```'

      # 6) Check for orphaned test files not in modules
      - name: Check for orphaned test files
        run: |
          echo "### Checking for orphaned test files..."
          for f in $(find . -path ./target -prune -o -path './xtask/fixtures' -prune -o -name '*.rs' -path '*/tests/*' -print); do
            if ! grep -q "^mod " "$f" 2>/dev/null && ! grep -q "^fn " "$f" 2>/dev/null; then
              echo "Warning: Possible orphaned test file: $f"
            fi
          done || echo "✓ No orphaned test files detected"

      # 7) Store test counts for PR comparison
      - name: Generate test count summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Test Discovery Report (${{ matrix.features || 'default' }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Total tests discovered:** ${{ env.TOTAL_DISCOVERED_TESTS }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Per-crate breakdown:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo metadata --no-deps --format-version=1 | jq -r '.packages[].name' \
          | while read CRATE; do
              COUNT=$(cargo nextest list -p "$CRATE" ${{ matrix.features }} 2>/dev/null | grep -E '^\s+(test|bench)' | wc -l | tr -d ' ')
              [ "$COUNT" -gt 0 ] && printf "%-35s %6d tests\n" "$CRATE" "$COUNT"
            done | sort -k2 -nr >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  package-validation:
    name: Package Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate package manifests
        run: |
          cargo package -p adze-ir --no-verify
          cargo package -p adze-glr-core --no-verify
          cargo package -p adze-tablegen --no-verify
          cargo package -p adze-common --no-verify
          cargo package -p adze-macro --no-verify
          cargo package -p adze --no-verify
          cargo package -p adze-tool --no-verify

  benches-unstable:
    name: Benches (unstable, opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build benches (no run)
        run: cargo bench -p adze --features unstable-benches --no-run

  ci-supported:
    name: ci-supported
    runs-on: ubuntu-latest
    concurrency:
      group: ci-supported-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Run ci-supported lane
        run: just ci-supported
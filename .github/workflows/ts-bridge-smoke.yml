name: ts-bridge-smoke
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Install Tree-sitter libraries (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtree-sitter-dev pkg-config
      
      - name: Install Tree-sitter libraries (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install tree-sitter pkg-config
      
      - name: Install Tree-sitter libraries (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Use vcpkg to install tree-sitter (if available)
          # or fallback to vendored build (default feature)
          echo "Using vendored Tree-sitter build on Windows"
      - name: Run ts-bridge smoke test
        shell: bash
        run: bash scripts/smoke-link.sh ts-bridge
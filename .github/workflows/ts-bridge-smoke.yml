name: ts-bridge-smoke
on: [push, pull_request]
jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run ts-bridge smoke test
        run: bash scripts/smoke-link.sh ts-bridge
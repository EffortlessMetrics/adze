name: Pure Rust Implementation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test-pure-rust:
    name: Test Pure Rust Implementation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Run benchmarks (check compilation)
      run: cargo bench --no-run
  
  test-wasm:
    name: Test WASM Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    
    - name: Build WASM
      run: |
        cd runtime
        wasm-pack build --target web --features wasm --no-default-features
    
    - name: Check WASM size
      run: |
        ls -lh runtime/pkg/*.wasm
        size=$(stat -c%s runtime/pkg/*_bg.wasm)
        echo "WASM size: $size bytes"
        if [ $size -gt 1048576 ]; then
          echo "Warning: WASM size exceeds 1MB"
        fi
  
  golden-tests:
    name: Golden Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Tree-sitter CLI
      run: |
        npm install -g tree-sitter-cli
        tree-sitter --version
    
    - name: Run golden tests
      run: |
        cd runtime
        cargo test --test golden_tests -- --ignored
    
    - name: Upload golden test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: golden-test-failures
        path: runtime/tests/golden/*.diff
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Test with real grammars
      run: |
        # Test with tree-sitter-json
        cargo test --features tree-sitter-c2rust test_json_parsing
        
        # Test with tree-sitter-rust
        cargo test --features tree-sitter-c2rust test_rust_parsing
  
  performance:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Run benchmarks
      run: |
        cd runtime
        cargo bench --features benchmarks | tee bench_results.txt
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: runtime/bench_results.txt
    
    - name: Check for performance regression
      run: |
        # Simple check - could be enhanced with historical comparison
        if grep -q "slower" runtime/bench_results.txt; then
          echo "Potential performance regression detected"
          exit 1
        fi
  
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov
    
    - name: Generate coverage
      run: |
        cd runtime
        cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
    
    - name: Upload to codecov
      uses: codecov/codecov-action@v3
      with:
        files: runtime/lcov.info
        fail_ci_if_error: false
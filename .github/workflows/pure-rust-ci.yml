name: Pure Rust Implementation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test-pure-rust:
    name: Test Pure Rust Implementation
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      if: matrix.os != 'windows-latest'
      run: cargo fmt --all -- --check

    - name: Clippy (default features)
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Clippy (tree-sitter-c2rust)
      if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
      run: cargo clippy -p adze --lib --no-default-features --features tree-sitter-c2rust -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --workspace --exclude adze-wasm-demo --exclude test-vec-wrapper --verbose

    - name: Test test-vec-wrapper (isolated)
      if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
      env:
        CARGO_TARGET_DIR: target/test-vec-wrapper-ci
      run: cargo test -p test-vec-wrapper --verbose

    - name: Run example crate tests
      if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
      run: cargo test --manifest-path example/Cargo.toml --test verify_fixture_parsing -- --test-threads=1

    - name: Run grammar integration tests
      if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
      run: cargo test --manifest-path tests/grammar-integration/Cargo.toml --verbose -- --test-threads=2

    - name: Run benchmarks (check compilation)
      run: cargo bench --workspace --exclude adze-wasm-demo --exclude test-vec-wrapper --no-run

  targeted-surfaces:
    name: Targeted PR Surfaces
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Test test-vec-wrapper (isolated)
      env:
        CARGO_TARGET_DIR: target/test-vec-wrapper-ci
      run: cargo test -p test-vec-wrapper --verbose

    - name: Run example crate tests
      run: cargo test --manifest-path example/Cargo.toml --test verify_fixture_parsing -- --test-threads=1

    - name: Run grammar integration tests
      run: cargo test --manifest-path tests/grammar-integration/Cargo.toml --verbose -- --test-threads=2

  test-vec-wrapper-windows:
    name: Test test-vec-wrapper (Windows PR smoke)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Test test-vec-wrapper (isolated)
      env:
        CARGO_TARGET_DIR: target/test-vec-wrapper-ci-windows
      run: cargo test -p test-vec-wrapper --verbose
  
  test-wasm:
    name: Test WASM Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    
    - name: Build WASM
      run: |
        cd runtime
        wasm-pack build --target web --features wasm --no-default-features

    - name: Build adze-wasm-demo with wasm-pack
      run: |
        cd wasm-demo
        wasm-pack build --target web --out-dir pkg-ci
        test -f pkg-ci/adze_wasm_demo.js
        test -f pkg-ci/adze_wasm_demo_bg.wasm
    
    - name: Check runtime WASM size
      run: |
        ls -lh runtime/pkg/*.wasm
        size=$(stat -c%s runtime/pkg/*_bg.wasm)
        echo "WASM size: $size bytes"
        if [ $size -gt 1048576 ]; then
          echo "Warning: WASM size exceeds 1MB"
        fi

    - name: Check adze-wasm-demo artifact layout
      run: ls -lh wasm-demo/pkg-ci
  
  golden-tests:
    name: Golden Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Tree-sitter CLI
      run: |
        npm install -g tree-sitter-cli
        tree-sitter --version
    
    - name: Run golden tests
      run: |
        cd runtime
        cargo test --test golden_tests -- --ignored
    
    - name: Upload golden test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: golden-test-failures
        path: runtime/tests/golden/*.diff
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Test with c2rust backend
      run: |
        cargo test -p adze --no-default-features --features tree-sitter-c2rust --lib
  
  performance:
    name: Performance Regression Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Run benchmarks
      run: |
        cd runtime
        cargo bench --features unstable-benches | tee bench_results.txt
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: runtime/bench_results.txt
    
    - name: Check for performance regression
      run: |
        # Simple check - could be enhanced with historical comparison
        if grep -q "slower" runtime/bench_results.txt; then
          echo "Potential performance regression detected"
          exit 1
        fi
  
  coverage:
    name: Code Coverage
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov
    
    - name: Generate coverage
      run: |
        cargo llvm-cov --workspace --exclude adze-wasm-demo --exclude test-vec-wrapper --features "pure-rust,glr,incremental_glr,external_scanners,serialization,ts-compat" --lcov --output-path lcov.info
    
    - name: Upload to codecov
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: false

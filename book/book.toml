[book]
title = "Adze Documentation"
authors = ["Adze Contributors"]
description = "The official documentation for Adze - a Rust framework for generating Tree-sitter parsers"
language = "en"

[build]
build-dir = "book"

[rust]
edition = "2024"

[output.html]
default-theme = "rust"
git-repository-url = "https://github.com/EffortlessMetrics/adze"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/EffortlessMetrics/adze/edit/main/book/{path}"

[output.html.playground]
runnable = false

[output.html.fold]
enable = true
level = 0

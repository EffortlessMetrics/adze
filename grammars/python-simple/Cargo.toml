[package]
name = "adze-python-simple"
version = "0.1.0"
license = "MIT OR Apache-2.0"
edition = "2024"
description = "Simplified Python grammar for Adze testing"

[features]
default = ["pure-rust"]
pure-rust = ["adze/pure-rust"]

[dependencies]
adze = { path = "../../runtime", default-features = false }

[build-dependencies]
adze-tool = { path = "../../tool" }
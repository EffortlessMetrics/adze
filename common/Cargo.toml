[package]
name = "adze-common"
description = "Shared logic for the Adze macro and tool"
readme = "../README.md"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
edition = "2024"
license = "MIT OR Apache-2.0"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"
adze-syn-type-utils-core = { version = "0.8.0-dev", path = "../crates/syn-type-utils-core" }

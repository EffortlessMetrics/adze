[package]
name = "adze-common"
description = "Shared logic for the Rust Sitter macro and tool"
readme = "../README.md"
repository = "https://github.com/hydro-project/rust-sitter"
version = "0.8.0-dev"
authors = ["Steven Zimmerman, CPA"]
edition = "2024"
license = "MIT"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"

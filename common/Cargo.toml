[package]
name = "adze-common"
description = "Shared logic for Adze macro and tooling"
readme = "../README.md"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors = ["Steven Zimmerman, CPA"]
edition = "2024"
license = "MIT"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
strict_docs = [] # Enable strict documentation requirements

[dependencies]
adze-common-syntax-core = { version = "0.1.0", path = "../crates/common-syntax-core" }
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"

[dev-dependencies]
insta.workspace = true
serde_json.workspace = true
proptest.workspace = true
regex = "1"
proc-macro2 = "1"

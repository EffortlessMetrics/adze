[package]
name = "adze-common"
description = "Shared logic for the Adze macro and tool"
repository = "https://github.com/EffortlessMetrics/adze"
version = "0.8.0-dev"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "MIT OR Apache-2.0"
homepage = "https://github.com/EffortlessMetrics/adze"
readme = "README.md"
keywords = ["parsing", "codegen", "grammar"]
categories = ["development-tools"]

[lib]
path = "src/lib.rs"

[features]
strict_docs = [] # Enable strict documentation requirements

[dependencies]
syn = { version = "2", features = [ "full", "extra-traits" ] }
quote = "1"

[package]
name = "ts-bridge"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"

[lib]
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "extract-json"
required-features = ["with-grammars"]

[dependencies]
libloading = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
tree-sitter-json = { version = "0.24", optional = true }

[build-dependencies]
cc = "1.0"
pkg-config = "0.3"

[dev-dependencies]
rand = "0.8"

[features]
default = ["vendored-ts-runtime"]
with-grammars = ["dep:tree-sitter-json"]  # parity tests with real grammars
vendored-ts-runtime = []                  # compile Tree-sitter runtime into the shim (default)
link-system-ts = []                       # instead of vendoring, link system libtree-sitter via pkg-config
ts-ffi-raw = []                           # compile raw C shim for internal functions

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adze GLR Parser WASM Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .demo-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .input-section, .output-section {
            display: flex;
            flex-direction: column;
        }
        
        label, .section-header {
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        .section-header {
            font-size: 1rem;
            margin-top: 0;
        }

        .control-label {
            margin-right: 10px;
            margin-bottom: 0;
        }
        
        textarea {
            width: 100%;
            min-height: 300px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .output {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px;
            min-height: 300px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            align-items: center;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .language-select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        
        .stats {
            background: #e8f5e9;
            border: 2px solid #c8e6c9;
            border-radius: 6px;
            padding: 10px;
            margin-top: 20px;
            font-family: monospace;
        }
        
        .error {
            color: #d32f2f;
            font-weight: bold;
        }
        
        .success {
            color: #388e3c;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 adze GLR Parser</h1>
        <p class="subtitle">Pure Rust • WASM-Compatible • Generalized LR Parsing</p>
        
        <div class="controls">
            <label for="language" class="control-label">Language:</label>
            <select id="language" class="language-select">
                <option value="python">Python</option>
                <option value="arithmetic">Arithmetic</option>
            </select>
            <button onclick="parseCode()">Parse</button>
            <button onclick="loadExample()">Load Example</button>
        </div>
        
        <div class="demo-section">
            <div class="input-section">
                <label for="input">Source Code:</label>
                <textarea id="input" placeholder="Enter code here..."></textarea>
            </div>
            
            <div class="output-section">
                <h2 class="section-header">Parse Result:</h2>
                <div id="output" class="output" aria-live="polite">
                    <span class="loading">Loading WASM module...</span>
                </div>
            </div>
        </div>
        
        <div id="stats" class="stats" style="display: none;"></div>
    </div>
    
    <script type="module">
        import init, { parse_python, parse_arithmetic, get_parser_stats } from './pkg/adze_wasm_demo.js';
        
        let wasmModule = null;
        
        async function loadWasm() {
            try {
                wasmModule = await init();
                document.getElementById('output').innerHTML = '<span class="success">✓ WASM module loaded successfully</span>';
                loadExample();
            } catch (error) {
                document.getElementById('output').innerHTML = `<span class="error">Failed to load WASM: ${error}</span>`;
            }
        }
        
        window.parseCode = function() {
            if (!wasmModule) {
                alert('WASM module not loaded yet');
                return;
            }
            
            const input = document.getElementById('input').value;
            const language = document.getElementById('language').value;
            const outputEl = document.getElementById('output');
            const statsEl = document.getElementById('stats');
            
            try {
                let result;
                if (language === 'python') {
                    result = parse_python(input);
                } else {
                    result = parse_arithmetic(input);
                }
                
                outputEl.innerHTML = result.includes('successful') 
                    ? `<span class="success">${result}</span>`
                    : `<span class="error">${result}</span>`;
                
                // Get and display stats (when implemented)
                const stats = get_parser_stats();
                if (stats !== "Stats: To be implemented") {
                    statsEl.style.display = 'block';
                    statsEl.textContent = stats;
                }
            } catch (error) {
                outputEl.innerHTML = `<span class="error">Error: ${error}</span>`;
            }
        };
        
        window.loadExample = function() {
            const language = document.getElementById('language').value;
            const inputEl = document.getElementById('input');
            
            if (language === 'python') {
                inputEl.value = `def fibonacci(n):
    if n <= 1:
        return n
    else:
        return fibonacci(n-1) + fibonacci(n-2)

class Calculator:
    def __init__(self):
        self.result = 0
    
    def add(self, x, y):
        return x + y

# Test the functions
for i in range(10):
    print(fibonacci(i))`;
            } else {
                inputEl.value = `1 + 2 * 3 + 4 * 5 + 6 * 7`;
            }
        };
        
        // Load WASM on page load
        loadWasm();
    </script>
</body>
</html>

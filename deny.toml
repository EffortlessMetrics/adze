# cargo-deny configuration for rust-sitter
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # Add specific advisory IDs to ignore if needed
    # Example: "RUSTSEC-2020-0001",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0", # for some Mozilla crates
]
confidence-threshold = 0.8
exceptions = [
    # Example: { allow = ["LicenseRef-UFL-1.0"], name = "ring" },
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Deny specific crates
deny = [
    # Example of crates to ban:
    # { name = "openssl", reason = "Use rustls instead" },
]

# Skip certain crates when checking for duplicates
skip = [
    # Example: { name = "winapi" }, # Commonly has multiple versions
]

# Skip entire tree of certain crates
skip-tree = [
    # Example: { name = "windows-sys" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Add any private git dependencies here if needed
]
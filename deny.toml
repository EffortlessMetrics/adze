# cargo-deny configuration for adze
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.93
# NOTE: Any license NOT in the allow list above is automatically denied.
# This means copyleft licenses (GPL, AGPL, LGPL, SSPL, etc.) are blocked.

exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "deny"
wildcards = "allow" # all workspace crates are publish = false with path deps
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    { name = "openssl", reason = "use rustls for TLS" },
    { name = "openssl-sys", reason = "use rustls for TLS" },
]

# Known duplicate versions from transitive dependencies
skip = [
    { crate = "bitflags@1", reason = "axum/lsp-types use v1, newer crates use v2" },
    { crate = "getrandom@0.3", reason = "transitive dep version split (rand ecosystem migration)" },
    { crate = "socket2@0.5", reason = "transitive dep version split (tokio/hyper migration)" },
    { crate = "syn@1", reason = "tree-sitter 0.20 uses syn 1, rest uses syn 2" },
    { crate = "thiserror@1", reason = "tree-sitter 0.20 uses thiserror 1, rest uses thiserror 2" },
    { crate = "thiserror-impl@1", reason = "pulled in by thiserror 1.x" },
    { crate = "tree-sitter@0.20", reason = "legacy tree-sitter-c2rust backend" },
]

# Skip entire dependency trees for platform-specific crates with many versions
skip-tree = [
    { crate = "windows-sys", reason = "transitive Windows platform crate with multiple versions" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[package]
name = "rust-sitter-tool"
description = "The external tool for Rust Sitter that extracts grammars from Rust definitions"
readme = "../README.md"
repository = "https://github.com/hydro-project/rust-sitter"
version = "0.6.0"
authors = ["Shadaj Laddad <shadaj@users.noreply.github.com>"]
license = "MIT"
edition = "2024"
keywords = ["parsing", "codegen"]
categories = ["development-tools"]

[features]
default = ["build_parsers"]
build_parsers = [
    "dep:tempfile",
    "dep:tree-sitter",
    "dep:tree-sitter-generate",
    "dep:cc",
]
no_opt = []   # compile without the optimizer for debugging
optimize = ["rust-sitter-ir/optimize"]

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
syn-inline-mod = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
rust-sitter-common = { version = "0.6.0", path = "../common" }
rust-sitter-ir = { version = "0.6.0", path = "../ir" }
rust-sitter-glr-core = { version = "0.6.0", path = "../glr-core" }
rust-sitter-tablegen = { version = "0.6.0", path = "../tablegen" }
regex = "1.10"
anyhow = "1.0"
indexmap = "2.0"
clap = { version = "4.5", features = ["derive"] }
glob = "0.3"

tempfile = { version = "3", optional = true }
tree-sitter = { version = "0.25.2", optional = true }
tree-sitter-generate = { version = "0.25.1", optional = true }
cc = { version = "1", optional = true }

[[bin]]
name = "rust-sitter-gen"
path = "src/bin/rust-sitter.rs"

[dev-dependencies]
insta = "1.39"

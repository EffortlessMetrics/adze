[package]
name = "rust-sitter-glr-core"
version = "0.8.0-dev"
edition = "2024"
rust-version = "1.87"
description = "GLR parser generation algorithms for pure-Rust Tree-sitter"
license = "MIT"
repository = "https://github.com/hydro-project/rust-sitter"
homepage = "https://github.com/hydro-project/rust-sitter"
documentation = "https://docs.rs/rust-sitter-glr-core"
readme = "README.md"
publish = false
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**"
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
rust-sitter-ir = { version = "0.8.0-dev", path = "../ir" }
indexmap = { version = "2.0", features = ["serde"] }
fixedbitset = { version = "0.5", default-features = false }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2"
typed-arena = "2.0"

# Optional parallel processing
rayon = { version = "1.0", optional = true }
rustc-hash = "2.1.1"

[features]
default = []
parallel = ["rayon"]
strict_docs = []
glr-trace = []
test-helpers = []
strict-invariants = []
memory-tests = []
json-parity = []
perf-counters = []
test-api = []

[dev-dependencies]
insta = "1.0"
criterion = "0.5"
dhat = "0.3"
serde_json = "1.0"
glr-test-support = { path = "../glr-test-support" }

[[bench]]
name = "automaton"
harness = false

[[bench]]
name = "perf_snapshot"
harness = false

[package]
name = "rust-sitter-glr-core"
version = "0.8.0-dev"
edition.workspace = true
rust-version.workspace = true
description = "GLR parser generation algorithms for pure-Rust Tree-sitter"
license = "MIT"
repository = "https://github.com/EffortlessMetrics/rust-sitter"
homepage = "https://github.com/EffortlessMetrics/rust-sitter"
documentation = "https://docs.rs/rust-sitter-glr-core"
readme = "README.md"
publish = false
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**"
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
rust-sitter-ir = { version = "0.8.0-dev", path = "../ir" }
indexmap = { version = "2.0", features = ["serde"] }
fixedbitset = { version = "0.5", default-features = false }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2"
typed-arena = "2.0"

# Optional parallel processing
rayon = { version = "1.0", optional = true }
rustc-hash = "2.1.1"
smallvec = "1.13"

# Optional serialization support for GLR mode
bincode = { version = "1.3", optional = true }

# Optional serialization support for GLR mode
bincode = { version = "1.3", optional = true }

[features]
default = []
parallel = ["rayon"]
serialization = ["bincode"]  # Enable ParseTable serialization for GLR mode
strict_docs = []
strict_api = []
glr-trace = []
glr_telemetry = []  # Enable telemetry counters for performance monitoring
test-helpers = []
strict-invariants = []
memory-tests = []
json-parity = []
perf-counters = []
test-api = []
debug_glr = [] # Enable debug output for GLR parser

[dev-dependencies]
insta = "1.0"
criterion = "0.5"
dhat = "0.3"
serde_json = "1.0"
glr-test-support = { path = "../glr-test-support" }
trybuild = "1"

[[bench]]
name = "automaton"
harness = false

[[bench]]
name = "perf_snapshot"
harness = false

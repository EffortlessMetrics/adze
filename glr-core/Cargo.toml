[package]
name = "adze-glr-core"
version = "0.8.0-dev"
edition.workspace = true
rust-version.workspace = true
description = "GLR parser generation algorithms for Adze"
license = "MIT OR Apache-2.0"
repository = "https://github.com/EffortlessMetrics/adze"
homepage = "https://github.com/EffortlessMetrics/adze"
documentation = "https://docs.rs/adze-glr-core"
readme = "README.md"
publish = false
include = [
    "Cargo.toml",
    "LICENSE*",
    "README*",
    "src/**"
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
adze-ir = { version = "0.8.0-dev", path = "../ir" }
adze-glr-versioning = { version = "0.8.0-dev", path = "../crates/glr-versioning" }
adze-precedence-compare-core = { version = "0.8.0-dev", path = "../crates/precedence-compare-core" }
indexmap = { version = "2.0", features = ["serde"] }
fixedbitset = { version = "0.5", default-features = false }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2"
typed-arena = "2.0"

# Optional parallel processing
rayon = { version = "1.0", optional = true }
rustc-hash = "2.1.1"
smallvec = "1.13"

# Optional serialization support for GLR mode
postcard = { version = "1", features = ["use-std"], optional = true }

[features]
default = []
parallel = ["rayon"]
serialization = ["dep:postcard"]  # Enable ParseTable serialization for GLR mode
strict_docs = []
strict_api = []
glr-trace = []
glr_telemetry = []  # Enable telemetry counters for performance monitoring
test-helpers = []
strict-invariants = []
memory-tests = []
json-parity = []
perf-counters = []
test-api = []
debug_glr = [] # Enable debug output for GLR parser

[dev-dependencies]
insta = "1.0"
criterion = "0.5"
dhat = "0.3"
serde_json = "1.0"
adze-bdd-scenario-fixtures = { path = "../crates/bdd-scenario-fixtures" }
adze-parser-contract = { path = "../crates/parser-contract" }
glr-test-support = { path = "../glr-test-support" }
trybuild = "1"

[[bench]]
name = "automaton"
harness = false

[[bench]]
name = "perf_snapshot"
harness = false

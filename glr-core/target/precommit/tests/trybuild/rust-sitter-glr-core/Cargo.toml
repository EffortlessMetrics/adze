[package]
name = "rust-sitter-glr-core-tests"
version = "0.0.0"
edition = "2024"
publish = false

[features]
debug_glr = ["rust-sitter-glr-core/debug_glr"]
default = ["rust-sitter-glr-core/default"]
glr-trace = ["rust-sitter-glr-core/glr-trace"]
json-parity = ["rust-sitter-glr-core/json-parity"]
memory-tests = ["rust-sitter-glr-core/memory-tests"]
parallel = ["rust-sitter-glr-core/parallel"]
perf-counters = ["rust-sitter-glr-core/perf-counters"]
strict-invariants = ["rust-sitter-glr-core/strict-invariants"]
strict_api = ["rust-sitter-glr-core/strict_api"]
strict_docs = ["rust-sitter-glr-core/strict_docs"]
test-api = ["rust-sitter-glr-core/test-api"]
test-helpers = ["rust-sitter-glr-core/test-helpers"]

[dependencies.criterion]
version = "0.5"
default-features = true

[dependencies.dhat]
version = "0.3"
default-features = true

[dependencies.fixedbitset]
version = "0.5"
default-features = false

[dependencies.glr-test-support]
path = "/home/steven/code/rust-sitter/glr-core/../glr-test-support/"

[dependencies.indexmap]
version = "2.0"
features = ["serde"]

[dependencies.insta]
version = "1.0"
default-features = true

[dependencies.rayon]
version = "1.0"
optional = true

[dependencies.rust-sitter-glr-core]
path = "/home/steven/code/rust-sitter/glr-core/"
default-features = false

[dependencies.rust-sitter-ir]
version = "0.8.0-dev"
path = "/home/steven/code/rust-sitter/glr-core/../ir/"

[dependencies.rustc-hash]
version = "2.1.1"
default-features = true

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"
default-features = true

[dependencies.thiserror]
version = "2"
default-features = true

[dependencies.typed-arena]
version = "2.0"
default-features = true

[[bin]]
name = "rust-sitter-glr-core-tests"
path = "main.rs"

[[bin]]
name = "trybuild000"
path = "/home/steven/code/rust-sitter/glr-core/tests/fixtures/missing_parse_table_fields.rs"

[workspace]

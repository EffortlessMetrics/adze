[package]
name = "rust-sitter-cli"
version = "1.0.0"
edition = "2024"
authors = ["Tree-sitter Contributors"]
description = "CLI tools for rust-sitter grammar development"
license = "MIT"

[[bin]]
name = "rust-sitter"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
rust-sitter = { path = "../runtime" }
rust-sitter-tool = { path = "../tool" }
rust-sitter-ir = { path = "../ir" }
rust-sitter-common = { path = "../common" }
serde_json = "1.0"
colored = "3.0"
anyhow = "1.0"
env_logger = "0.11"
log = "0.4"
walkdir = "2.5"
notify = "8"

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.0"
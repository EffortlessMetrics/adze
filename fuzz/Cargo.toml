[package]
name = "rust-sitter-fuzz"
version = "0.0.0"
publish = false
edition = "2024"
rust-version = "1.89"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
rust-sitter = { path = "../runtime" }

[[bin]]
name = "fuzz_lexer"
path = "fuzz_targets/fuzz_lexer.rs"
test = false
doc = false

[[bin]]
name = "fuzz_parser"
path = "fuzz_targets/fuzz_parser.rs"
test = false
doc = false

[[bin]]
name = "fuzz_external_scanner"
path = "fuzz_targets/fuzz_external_scanner.rs"
test = false
doc = false
